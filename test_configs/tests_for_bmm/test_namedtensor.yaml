test_suite_config:
  files:
  - path: ${PYTORCH_ROOT}/test/test_namedtensor.py
    unlisted_test_mode: skip
    tests:
    - names:
      - TestNamedTensor::test_bmm
      mode: mandatory_success
      tags:
      - namedtensor
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
          args:
          - tensor:
              shape:
              - 7
              - 3
              - 2
              dtype: float16
              device: spyre
              init: rand
  global:
    devices:
    - spyre
    supported_dtypes:
    - name: float16
    - name: float32
    supported_ops: []
