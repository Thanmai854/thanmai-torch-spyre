test_suite_config:
  files:
  - path: ${PYTORCH_ROOT}/test/inductor/test_cpu_select_algorithm.py
    unlisted_test_mode: skip
    tests:
    - names:
      - TestSelectAlgorithm::test_bmm_flexible_layout
      mode: mandatory_success
      tags:
      - inductor
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
          args:
          - tensor:
              shape:
              - 2
              - 24
              - 512
              - 64
              dtype: float16
              device: spyre
              init: rand
    - names:
      - TestSelectAlgorithm::test_bmm_freezing
      mode: mandatory_success
      tags:
      - inductor
      - fp16
      edits:
        dtypes:
          include:
          - name: float16
          - name: float32
          exclude:
          - name: bfloat16
            description: Not supported on Spyre
