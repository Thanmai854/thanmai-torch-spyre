test_suite_config:
  files:
  - path: ${PYTORCH_ROOT}/test/inductor/test_select_algorithm.py
    unlisted_test_mode: skip
    tests:
    - names:
      - TestSelectAlgorithm::test_bmm
      mode: mandatory_success
      tags:
      - inductor
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
          args:
          - tensor:
              shape:
              - 2
              - 32
              - 8
              dtype: float16
              device: spyre
              init: rand
    - names:
      - TestSelectAlgorithm::test_baddbmm
      mode: mandatory_success
      tags:
      - inductor
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
          args:
          - tensor:
              shape:
              - 2
              - 1
              - 8
              dtype: float16
              device: spyre
              init: rand
  global:
    devices:
    - spyre
    supported_dtypes:
    - name: float16
    - name: float32
    supported_ops: []
