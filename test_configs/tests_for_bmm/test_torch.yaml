test_suite_config:
  files:
  - path: ${PYTORCH_ROOT}/test/test_torch.py
    unlisted_test_mode: skip
    tests:
    - names:
      - TestTorch::test_bmm_multithreaded
      mode: mandatory_success
      tags:
      - torch
      edits:
        dtypes:
          include:
          - name: float32
  global:
    devices:
    - spyre
    supported_dtypes:
    - name: float16
    - name: float32
    supported_ops: []
