test_suite_config:
  files:
  - path: ${PYTORCH_ROOT}/test/inductor/test_cutlass_backend.py
    unlisted_test_mode: skip
    tests:
    - names:
      - TestCutlassBackend::test_max_autotune_cutlass_backend_bmm
      mode: mandatory_success
      tags:
      - inductor
      - fp16
      edits:
        dtypes:
          include:
          - name: float16
          - name: float32
          exclude:
          - name: bfloat16
            description: Not supported on Spyre
    - names:
      - TestCutlassBackend::test_cutlass_backend_subproc_bmm
      mode: mandatory_success
      tags:
      - inductor
      - fp16
      edits:
        dtypes:
          include:
          - name: float16
  global:
    devices:
    - spyre
    supported_dtypes:
    - name: float16
    - name: float32
    supported_ops: []
