test_suite_config:
  files:
  - path: ${PYTORCH_ROOT}/test/inductor/test_pad_mm.py
    unlisted_test_mode: skip
    tests:
    - names:
      - PadMMTest::test_pad_bmm_dyn_b
      mode: mandatory_success
      tags:
      - inductor
      edits:
        dtypes:
          include:
          - name: float32
    - names:
      - PadMMTest::test_pad_bmm_dyn_k
      mode: mandatory_success
      tags:
      - inductor
      edits:
        dtypes:
          include:
          - name: float32
    - names:
      - PadMMTest::test_pad_bmm_dyn_bm
      mode: mandatory_success
      tags:
      - inductor
      edits:
        dtypes:
          include:
          - name: float32
    - names:
      - PadMMTest::test_pad_batch
      mode: mandatory_success
      tags:
      - inductor
      - fp16
      edits:
        dtypes:
          include:
          - name: float16
          - name: float32
  global:
    devices:
    - spyre
    supported_dtypes:
    - name: float16
    - name: float32
    supported_ops: []
