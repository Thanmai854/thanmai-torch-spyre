test_suite_config:
  files:
  - path: ${PYTORCH_ROOT}/test/fx/test_z3_gradual_types.py
    unlisted_test_mode: skip
    tests:
    - names:
      - HFOperations::test_bmm3
      mode: mandatory_success
      tags:
      - fx
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
          args:
          - tensor:
              shape:
              - 2
              - 3
              - 3
              dtype: float16
              device: spyre
              init: rand
    - names:
      - HFOperations::test_bmm2
      mode: mandatory_success
      tags:
      - fx
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
          args:
          - tensor:
              shape:
              - 1
              - 2
              - 3
              dtype: float16
              device: spyre
              init: rand
    - names:
      - HFOperations::test_bmm
      mode: mandatory_success
      tags:
      - fx
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
          args:
          - tensor:
              shape:
              - 1
              - 2
              - 3
              dtype: float16
              device: spyre
              init: rand
  global:
    devices:
    - spyre
    supported_dtypes:
