test_suite_config:
  files:
  - path: ${PYTORCH_ROOT}/test/inductor/test_perf.py
    unlisted_test_mode: skip
    tests:
    - names:
      - FusionTests::test_vertical_sum_pw
      mode: mandatory_success
      tags:
      - inductor
      edits:
        dtypes:
          include:
          - name: float32
        inputs:
          args:
          - tensor:
              shape:
              - 10
              - 10
              dtype: float16
              device: spyre
              init: rand
    - names:
      - NoopTests::test_noop_int_ops
      mode: mandatory_success
      tags:
      - inductor
      edits:
        dtypes:
          include:
          - name: float32
        inputs:
          args:
          - tensor:
              shape:
              - 10
              dtype: float16
              device: spyre
              init: rand
  global:
    devices:
    - spyre
    supported_dtypes:
    - name: float16
    - name: float32
    supported_ops: []
