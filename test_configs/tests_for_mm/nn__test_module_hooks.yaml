test_suite_config:
  files:
  - path: ${PYTORCH_ROOT}/test/nn/test_module_hooks.py
    unlisted_test_mode: skip
    tests:
    - names:
      - TestModuleHooks::test_always_called_forward_hooks
      mode: mandatory_success
      tags:
      - nn
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
          args:
          - tensor:
              shape:
              - 10
              - 10
              dtype: float16
              device: spyre
              init: rand
  global:
    devices:
    - spyre
    supported_dtypes:
    - name: float16
    - name: float32
    supported_ops: []
