test_suite_config:
  files:
  - path: ${PYTORCH_ROOT}/test/torch_np/numpy_tests/fft/test_pocketfft.py
    unlisted_test_mode: skip
    tests:
    - names:
      - TestFFT1D::test_ihfft
      mode: mandatory_success
      tags:
      - torch_np
      edits:
        dtypes:
          include:
          - name: float32
        inputs:
          args:
          - tensor:
              shape:
              - 30
              - 20
              - 10
              dtype: float16
              device: spyre
              init: rand
    - names:
      - TestFFT1D::test_hfft
      mode: mandatory_success
      tags:
      - torch_np
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
          args:
          - tensor:
              shape:
              - 30
              - 20
              - 10
              dtype: float16
              device: spyre
              init: rand
  global:
    devices:
    - spyre
    supported_dtypes:
    - name: float16
    - name: float32
    supported_ops: []
