test_suite_config:
  files:
  - path: ${PYTORCH_ROOT}/test/dynamo/test_model_output.py
    unlisted_test_mode: skip
    tests:
    - names:
      - TestModelOutput::test_mo_getattr
      mode: mandatory_success
      tags:
      - dynamo
      edits:
        dtypes:
          include:
          - name: float16
    - names:
      - TestModelOutput::test_mo_getattr_missing
      mode: mandatory_success
      tags:
      - dynamo
      edits:
        dtypes:
          include:
          - name: float16
    - names:
      - TestModelOutput::test_mo_getitem
      mode: mandatory_success
      tags:
      - dynamo
      edits:
        dtypes:
          include:
          - name: float16
    - names:
      - TestModelOutputBert::test_HF_bert_model_output
      mode: mandatory_success
      tags:
      - dynamo
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
          args:
          - tensor:
              shape:
              - 1
              - 12
              - 768
              dtype: float16
              device: spyre
              init: rand
  global:
    devices:
    - spyre
    supported_dtypes:
    - name: float16
    - name: float32
    supported_ops: []
