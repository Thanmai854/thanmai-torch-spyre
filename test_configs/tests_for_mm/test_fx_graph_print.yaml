test_suite_config:
  files:
  - path: ${PYTORCH_ROOT}/test/test_fx_graph_print.py
    unlisted_test_mode: skip
    tests:
    - names:
      - TestFxGraphPrint::test_print_readable_multiple_meta_keys_formatting
      mode: mandatory_success
      tags:
      - fx_graph_print
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
          args:
          - tensor:
              shape:
              - 3
              dtype: float16
              device: spyre
              init: rand
    - names:
      - TestFxGraphPrint::test_print_readable_additional_meta_ordering
      mode: mandatory_success
      tags:
      - fx_graph_print
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
          args:
          - tensor:
              shape:
              - 3
              dtype: float16
              device: spyre
              init: rand
  global:
    devices:
    - spyre
    supported_dtypes:
    - name: float16
    - name: float32
    supported_ops: []
