test_suite_config:
  files:
  - path: ${PYTORCH_ROOT}/test/dynamo/test_debug_utils.py
    unlisted_test_mode: skip
    tests:
    - names:
      - TestDebugUtilsDevice::test_sym_aot_graph_parser
      mode: mandatory_success
      tags:
      - dynamo
      edits:
        dtypes:
          include:
          - name: float32
        inputs:
          args:
          - tensor:
              shape:
              - 1001
              - 6
              dtype: float16
              device: spyre
              init: rand
    - names:
      - TestBackendOverrideIntegration::test_override_multiple_ids
      mode: mandatory_success
      tags:
      - dynamo
      edits:
        dtypes:
          include:
          - name: float16
  global:
    devices:
    - spyre
    supported_dtypes:
    - name: float16
    - name: float32
    supported_ops: []
