test_suite_config:
  files:
  - path: ${PYTORCH_ROOT}/test/inductor/test_nv_universal_gemm.py
    unlisted_test_mode: skip
    tests:
    - names:
      - TestNVUniversalGemm::test_bmm_non_standard_batch_stride
      mode: mandatory_success
      tags:
      - inductor
      - fp16
      edits:
        dtypes:
          include:
          - name: float16
          - name: float32
          exclude:
          - name: bfloat16
            description: Not supported on Spyre
    - names:
      - TestNVUniversalGemm::test_scaled_gemm_mxfp8
      mode: mandatory_success
      tags:
      - inductor
      edits:
        dtypes:
          include:
          - name: float32
    - names:
      - TestNVUniversalGemm::test_scaled_gemm_nvf4
      mode: mandatory_success
      tags:
      - inductor
      - fp16
      edits:
        dtypes:
          include:
          - name: float16
          - name: float32
          exclude:
          - name: bfloat16
            description: Not supported on Spyre
    - names:
      - TestNVUniversalGemm::test_reinterpret_view_from_slice
      mode: mandatory_success
      tags:
      - inductor
      - fp16
      edits:
        dtypes:
          include:
          - name: float16
          - name: float32
          exclude:
          - name: bfloat16
            description: Not supported on Spyre
    - names:
      - TestNVUniversalGemmHeuristics::test_fallback_when_heuristics_unavailable
      mode: mandatory_success
      tags:
      - inductor
      - fp16
      edits:
        dtypes:
          include:
          - name: float16
          - name: float32
    - names:
      - TestNVUniversalGemmHeuristics::test_fallback_when_no_configs_extracted
      mode: mandatory_success
      tags:
      - inductor
      - fp16
      edits:
        dtypes:
          include:
          - name: float16
          - name: float32
    - names:
      - TestNVUniversalGemmHeuristics::test_filter_kernels_sorts_by_runtime
      mode: mandatory_success
      tags:
      - inductor
      edits:
        dtypes:
          include:
          - name: float16
    - names:
      - TestNVUniversalGemmHeuristicsIntegration::test_fp4_heuristic_configs
      mode: mandatory_success
      tags:
      - inductor
      edits:
        dtypes:
          include:
          - name: float32
  global:
    devices:
    - spyre
    supported_dtypes:
    - name: float16
    - name: float32
    supported_ops: []
