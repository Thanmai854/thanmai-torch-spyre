test_suite_config:
  files:
  - path: ${PYTORCH_ROOT}/test/dynamo/test_higher_order_ops.py
    unlisted_test_mode: skip
    tests:
    - names:
      - HigherOrderOpTests::test_concat_unbacked_shape_tensor
      mode: mandatory_success
      tags:
      - dynamo
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
          args:
          - tensor:
              shape:
              - 3
              dtype: float16
              device: spyre
              init: rand
    - names:
      - HigherOrderOpTests::test_vmap_source_fn_stack
      mode: mandatory_success
      tags:
      - dynamo
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
          args:
          - tensor:
              shape:
              - 3
              - 3
              - 3
              - 3
              dtype: float16
              device: spyre
              init: rand
    - names:
      - FuncTorchHigherOrderOpTests::test_grad
      mode: mandatory_success
      tags:
      - dynamo
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
          args:
          - tensor:
              shape:
              - 3
              - 3
              - 3
              dtype: float16
              device: spyre
              init: rand
    - names:
      - FuncTorchHigherOrderOpTests::test_vmap_two_inputs
      mode: mandatory_success
      tags:
      - dynamo
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
          args:
          - tensor:
              shape:
              - 3
              - 3
              dtype: float16
              device: spyre
              init: rand
    - names:
      - ActivationCheckpointingTests::test_flop_counter_for_nested_cond
      mode: mandatory_success
      tags:
      - dynamo
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
          args:
          - tensor:
              shape:
              - 4
              - 4
              dtype: float16
              device: spyre
              init: rand
    - names:
      - ActivationCheckpointingTests::test_flop_counter_for_cond_unbalanced_branches
      mode: mandatory_success
      tags:
      - dynamo
      edits:
        dtypes:
          include:
          - name: float32
        inputs:
          args:
          - tensor:
              shape:
              - 4
              - 4
              dtype: float16
              device: spyre
              init: rand
  global:
    devices:
    - spyre
    supported_dtypes:
    - name: float16
    - name: float32
    supported_ops: []
