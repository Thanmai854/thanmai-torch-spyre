test_suite_config:
  files:
  - path: ${PYTORCH_ROOT}/test/dynamo/test_generator.py
    unlisted_test_mode: skip
    tests:
    - names:
      - GeneratorTests::test_graph_break_outside_generator
      mode: mandatory_success
      tags:
      - dynamo
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
          args:
          - tensor:
              shape:
              - 2
              dtype: float16
              device: spyre
              init: rand
    - names:
      - GeneratorTests::test_iter
      mode: mandatory_success
      tags:
      - dynamo
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
          args:
          - tensor:
              shape:
              - 2
              dtype: float16
              device: spyre
              init: rand
  global:
    devices:
    - spyre
    supported_dtypes:
    - name: float16
    - name: float32
    supported_ops: []
