test_suite_config:
  files:
  - path: ${PYTORCH_ROOT}/test/inductor/test_autoheuristic.py
    unlisted_test_mode: skip
    tests:
    - names:
      - AutoHeuristicTest::test_mixed_mm_a100
      mode: mandatory_success
      tags:
      - inductor
      - fp16
      edits:
        dtypes:
          include:
          - name: float16
          - name: float32
    - names:
      - AutoHeuristicTest::test_autoheuristic_pad_mm_collect_data2
      mode: mandatory_success
      tags:
      - inductor
      edits:
        dtypes:
          include:
          - name: float16
    - names:
      - AutoHeuristicTest::test_autoheuristic_pad_mm_collect_data
      mode: mandatory_success
      tags:
      - inductor
      - fp16
      edits:
        dtypes:
          include:
          - name: float16
          - name: float32
    - names:
      - AutoHeuristicTest::test_autoheuristic_pad_mm_off
      mode: mandatory_success
      tags:
      - inductor
      - fp16
      edits:
        dtypes:
          include:
          - name: float16
          - name: float32
    - names:
      - AutoHeuristicTest::test_autoheuristic_pad_mm_default
      mode: mandatory_success
      tags:
      - inductor
      - fp16
      edits:
        dtypes:
          include:
          - name: float16
          - name: float32
    - names:
      - AutoHeuristicTest::test_autoheuristic_a100
      mode: mandatory_success
      tags:
      - inductor
      - fp16
      edits:
        dtypes:
          include:
          - name: float16
          - name: float32
    - names:
      - AutoHeuristicTest::test_autoheuristic_h100
      mode: mandatory_success
      tags:
      - inductor
      - fp16
      edits:
        dtypes:
          include:
          - name: float16
          - name: float32
        inputs:
          args:
          - tensor:
              shape:
              - 8
              - 1024
              dtype: float16
              device: spyre
              init: rand
  global:
    devices:
    - spyre
    supported_dtypes:
    - name: float16
    - name: float32
    supported_ops: []
