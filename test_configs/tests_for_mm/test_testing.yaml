test_suite_config:
  files:
  - path: ${PYTORCH_ROOT}/test/test_testing.py
    unlisted_test_mode: skip
    tests:
    - names:
      - TestTestParametrizationDeviceType::test_dtypes_composition_invalid
      mode: xfail
      tags:
      - testing
      edits:
        dtypes:
          include:
          - name: float32
    - names:
      - TestAssertCloseErrorMessage::test_mismatched_elements
      mode: mandatory_success
      tags:
      - testing
      edits:
        dtypes:
          include:
          - name: float32
        inputs:
          args:
          - tensor:
              shape:
              - 1
              - 2
              - 3
              - 4
              dtype: float16
              device: spyre
              init: rand
  global:
    devices:
    - spyre
    supported_dtypes:
    - name: float16
    - name: float32
    supported_ops: []
