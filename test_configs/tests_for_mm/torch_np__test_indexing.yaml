test_suite_config:
  files:
  - path: ${PYTORCH_ROOT}/test/torch_np/test_indexing.py
    unlisted_test_mode: skip
    tests:
    - names:
      - TestAdvancedIndexing::test_comprehensive_indexing
      mode: mandatory_success
      tags:
      - torch_np
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
          args:
          - tensor:
              shape:
              - 4
              - 6
              dtype: float16
              device: spyre
              init: rand
  global:
    devices:
    - spyre
    supported_dtypes:
    - name: float16
    - name: float32
    supported_ops: []
