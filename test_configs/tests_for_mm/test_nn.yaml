test_suite_config:
  files:
  - path: ${PYTORCH_ROOT}/test/test_nn.py
    unlisted_test_mode: skip
    tests:
    - names:
      - TestNN::test_named_children
      mode: mandatory_success
      tags:
      - nn
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
          args:
          - tensor:
              shape:
              - 2
              - 2
              dtype: float16
              device: spyre
              init: rand
    - names:
      - TestNN::test_children
      mode: mandatory_success
      tags:
      - nn
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
          args:
          - tensor:
              shape:
              - 2
              - 2
              dtype: float16
              device: spyre
              init: rand
  global:
    devices:
    - spyre
    supported_dtypes:
    - name: float16
    - name: float32
    supported_ops: []
