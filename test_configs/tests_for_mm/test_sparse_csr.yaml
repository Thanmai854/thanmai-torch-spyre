test_suite_config:
  files:
  - path: ${PYTORCH_ROOT}/test/test_sparse_csr.py
    unlisted_test_mode: skip
    tests:
    - names:
      - TestSparseCSR::test_addmm_dense_result
      mode: xfail
      tags:
      - sparse_csr
      edits:
        dtypes:
          include:
          - name: float32
        inputs:
          args:
          - tensor:
              shape:
              - 10
              - 1
              dtype: float16
              device: spyre
              init: rand
  global:
    devices:
    - spyre
    supported_dtypes:
    - name: float16
    - name: float32
    supported_ops: []
