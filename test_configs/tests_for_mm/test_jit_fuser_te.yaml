test_suite_config:
  files:
  - path: ${PYTORCH_ROOT}/test/test_jit_fuser_te.py
    unlisted_test_mode: skip
    tests:
    - names:
      - TestTEFuser::test_nop
      mode: mandatory_success
      tags:
      - jit_fuser_te
      edits:
        dtypes:
          include:
          - name: float32
        inputs:
          args:
          - tensor:
              shape:
              - 5
              - 3
              dtype: float16
              device: spyre
              init: rand
    - names:
      - TestTEFuser::test_bitwise_ops
      mode: mandatory_success
      tags:
      - jit_fuser_te
      edits:
        dtypes:
          include:
          - name: float16
  global:
    devices:
    - spyre
    supported_dtypes:
    - name: float16
    - name: float32
    supported_ops: []
