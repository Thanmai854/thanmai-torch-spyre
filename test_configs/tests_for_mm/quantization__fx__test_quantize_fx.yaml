test_suite_config:
  files:
  - path: ${PYTORCH_ROOT}/test/quantization/fx/test_quantize_fx.py
    unlisted_test_mode: skip
    tests:
    - names:
      - TestQuantizeFx::test_qconfig_module_name_object_type_order
      mode: mandatory_success
      tags:
      - quantization
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
          args:
          - tensor:
              shape:
              - 1
              - 1
              - 1
              - 1
              dtype: float16
              device: spyre
              init: rand
    - names:
      - TestQuantizeFx::test_prepare_custom_config_to_dict
      mode: mandatory_success
      tags:
      - quantization
      edits:
        dtypes:
          include:
          - name: float16
    - names:
      - TestQuantizeFx::test_convert_custom_config_from_dict
      mode: mandatory_success
      tags:
      - quantization
      edits:
        dtypes:
          include:
          - name: float16
    - names:
      - TestQuantizeFx::test_dynamic_linear_input_multiple_use
      mode: mandatory_success
      tags:
      - quantization
      - fp16
      edits:
        dtypes:
          include:
          - name: float16
          - name: float32
        inputs:
          args:
          - tensor:
              shape:
              - 5
              - 5
              - 5
              dtype: float16
              device: spyre
              init: rand
    - names:
      - TestQuantizeFx::test_backend_config_check_for_weight_and_bias
      mode: mandatory_success
      tags:
      - quantization
      edits:
        dtypes:
          include:
          - name: float32
        inputs:
          args:
          - tensor:
              shape:
              - 1
              - 5
              dtype: float16
              device: spyre
              init: rand
    - names:
      - TestQuantizeFxModels::test_qat_embeddingbag_linear
      mode: mandatory_success
      tags:
      - quantization
      edits:
        dtypes:
          include:
          - name: float32
  global:
    devices:
    - spyre
    supported_dtypes:
    - name: float16
    - name: float32
    supported_ops: []
