    tests:
    - names:
      - TestDtypeCustomRules::test_custom_rules_ints
      mode: mandatory_success
      tags:
      - jit
      edits:
        dtypes:
          include:
          - name: float32
  global:
    devices:
    - spyre
    supported_dtypes:
    - name: float16
    - name: float32
    supported_ops: []
