test_suite_config:
  files:
  - path: ${PYTORCH_ROOT}/test/onnx/exporter/test_building.py
    unlisted_test_mode: skip
    tests:
    - names:
      - TestOpRecorder::test_skippable_castlike_is_ommited
      mode: mandatory_success
      tags:
      - onnx
      edits:
        dtypes:
          include:
          - name: float32
        inputs:
          args:
          - tensor:
              shape:
              - 2
              - 3
              - 4
              dtype: float16
              device: spyre
              init: rand
  global:
    devices:
    - spyre
    supported_dtypes:
    - name: float16
    - name: float32
    supported_ops: []
