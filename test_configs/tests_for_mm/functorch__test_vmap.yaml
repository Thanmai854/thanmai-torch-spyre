          include:
          - name: float16
        inputs:
          args:
          - tensor:
              shape:
              - 100
              - 10
              - 10
              dtype: float16
              device: spyre
              init: rand
    - names:
      - TestVmapOperators::test_sum
      mode: mandatory_success
      tags:
      - functorch
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
          args:
          - tensor:
              shape:
              - 7
              - 1
              - 1
              dtype: float16
              device: spyre
              init: rand
    - names:
      - TestVmapBatchedGradient::test_trace
      mode: mandatory_success
      tags:
      - functorch
      - fp16
      edits:
        dtypes:
          include:
          - name: float16
          - name: float32
        inputs:
          args:
          - tensor:
              shape:
              - 2
              - 3
              dtype: float16
              device: spyre
              init: rand
  global:
    devices:
    - spyre
    supported_dtypes:
    - name: float16
    - name: float32
    supported_ops: []
