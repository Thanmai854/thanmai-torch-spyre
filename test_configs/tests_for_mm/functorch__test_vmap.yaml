test_suite_config:
  files:
  - path: ${PYTORCH_ROOT}/test/functorch/test_vmap.py
    unlisted_test_mode: skip
    tests:
    - names:
      - TestVmapBatchedGradient::test_lgamma
      mode: mandatory_success
      tags:
      - functorch
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
          args:
          - tensor:
              shape:
              - 2
              - 3
              dtype: float16
              device: spyre
              init: rand
    - names:
      - TestVmapOperators::test_mm
      mode: mandatory_success
      tags:
      - functorch
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
          args:
          - tensor:
              shape:
              - 2
              - 2
              dtype: float16
              device: spyre
              init: rand
    - names:
      - TestVmapOperators::test_bmm
      mode: mandatory_success
      tags:
      - functorch
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
          args:
          - tensor:
              shape:
              - 2
              - 2
              dtype: float16
              device: spyre
              init: rand
    - names:
      - TestVmapAPI::test_fallback_does_not_warn_by_default
      mode: mandatory_success
      tags:
      - functorch
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
          args:
          - tensor:
              shape:
              - 11
              dtype: float16
              device: spyre
              init: rand
    - names:
      - TestVmapAPI::test_fallback_warns_when_warnings_are_enabled
      mode: mandatory_success
      tags:
      - functorch
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
          args:
          - tensor:
              shape:
              - 11
              dtype: float16
              device: spyre
