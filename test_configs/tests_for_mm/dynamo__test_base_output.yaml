test_suite_config:
  files:
  - path: ${PYTORCH_ROOT}/test/dynamo/test_base_output.py
    unlisted_test_mode: skip
    tests:
    - names:
      - TestBaseOutput::test_getattr
      mode: mandatory_success
      tags:
      - dynamo
      edits:
        dtypes:
          include:
          - name: float16
    - names:
      - TestBaseOutput::test_index
      mode: mandatory_success
      tags:
      - dynamo
      edits:
        dtypes:
          include:
          - name: float16
  global:
    devices:
    - spyre
    supported_dtypes:
    - name: float16
    - name: float32
    supported_ops: []
