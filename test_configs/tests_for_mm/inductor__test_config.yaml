test_suite_config:
  files:
  - path: ${PYTORCH_ROOT}/test/inductor/test_config.py
    unlisted_test_mode: skip
    tests:
    - names:
      - TestInductorConfig::test_compile_api
      mode: mandatory_success
      tags:
      - inductor
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
          args:
          - tensor:
              shape:
              - 8
              dtype: float16
              device: spyre
              init: rand
    - names:
      - TestInductorConfig::test_codegen_skips_custom_passes
      mode: mandatory_success
      tags:
      - inductor
      edits:
        dtypes:
          include:
          - name: float16
  global:
    devices:
    - spyre
    supported_dtypes:
    - name: float16
    - name: float32
    supported_ops: []
