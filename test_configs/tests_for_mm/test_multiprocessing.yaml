test_suite_config:
  files:
  - path: ${PYTORCH_ROOT}/test/test_multiprocessing.py
    unlisted_test_mode: skip
    tests:
    - names:
      - TestMultiprocessing::test_cuda_send_many
      mode: mandatory_success
      tags:
      - multiprocessing
      edits:
        dtypes:
          include:
          - name: float16
    - names:
      - TestMultiprocessing::test_cuda_ipc_deadlock
      mode: mandatory_success
      tags:
      - multiprocessing
      edits:
        dtypes:
          include:
          - name: float32
  global:
    devices:
    - spyre
    supported_dtypes:
    - name: float16
    - name: float32
    supported_ops: []
