          args:
          - tensor:
              shape:
              - 32
              - 64
              dtype: float16
              device: spyre
              init: rand
    - names:
      - TestLookupTableE2E::test_tma_lookup_table_entry
      mode: mandatory_success
      tags:
      - inductor
      - fp16
      edits:
        dtypes:
          include:
          - name: float16
          - name: float32
        inputs:
          args:
          - tensor:
              shape:
              - 64
              - 64
              dtype: float16
              device: spyre
              init: rand
  global:
    devices:
    - spyre
    supported_dtypes:
    - name: float16
    - name: float32
    supported_ops: []
