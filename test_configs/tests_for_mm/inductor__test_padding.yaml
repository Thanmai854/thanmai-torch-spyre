test_suite_config:
  files:
  - path: ${PYTORCH_ROOT}/test/inductor/test_padding.py
    unlisted_test_mode: skip
    tests:
    - names:
      - PerfTestWithAndWithoutPadding::test_nvidia_deeprecommender
      mode: mandatory_success
      tags:
      - inductor
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
          args:
          - tensor:
              shape:
              - 256
              dtype: float16
              device: spyre
              init: rand
    - names:
      - PaddingTest::test_mm_padding_perf
      mode: mandatory_success
      tags:
      - inductor
      - fp16
      edits:
        dtypes:
          include:
          - name: float16
          - name: float32
    - names:
      - PaddingTest::test_padmm
      mode: mandatory_success
      tags:
      - inductor
      - fp16
      edits:
        dtypes:
          include:
          - name: float16
          - name: float32
        inputs:
          args:
          - tensor:
              shape:
              - 30522
              - 768
              dtype: float16
              device: spyre
              init: rand
  global:
    devices:
    - spyre
    supported_dtypes:
    - name: float16
    - name: float32
    supported_ops: []
