test_suite_config:
  files:
  - path: ${PYTORCH_ROOT}/test/inductor/test_mkldnn_pattern_matcher.py
    unlisted_test_mode: skip
    tests:
    - names:
      - TestPatternMatcher::test_reproduce_121253_issue_addmm_fusion_check
      mode: mandatory_success
      tags:
      - inductor
      - fp16
      edits:
        dtypes:
          include:
          - name: float16
          - name: float32
          exclude:
          - name: bfloat16
            description: Not supported on Spyre
        inputs:
          args:
          - tensor:
              shape:
              - 1
              - 64
              dtype: float16
              device: spyre
              init: rand
    - names:
      - TestDynamicPatternMatcherGeneric::test_conv_transpose2d_dynamic_shapes
      mode: xfail
      tags:
      - inductor
      - fp16
      edits:
        dtypes:
          include:
          - name: float16
          - name: float32
          exclude:
          - name: bfloat16
            description: Not supported on Spyre
  global:
    devices:
    - spyre
    supported_dtypes:
    - name: float16
    - name: float32
    supported_ops: []
