test_suite_config:
  files:
  - path: ${PYTORCH_ROOT}/test/cpp_extensions/test_libtorch_agnostic.py
    unlisted_test_mode: skip
    tests:
    - names:
      - TestLibtorchAgnostic::test_get_any_data_ptr
      mode: mandatory_success
      tags:
      - cpp_extensions
      edits:
        dtypes:
          include:
          - name: float32
        inputs:
          args:
          - tensor:
              shape:
              - 2
              - 5
              dtype: float16
              device: spyre
              init: rand
  global:
    devices:
    - spyre
    supported_dtypes:
    - name: float16
    - name: float32
    supported_ops: []
