test_suite_config:
  files:
  - path: ${PYTORCH_ROOT}/test/inductor/test_cuda_repro.py
    unlisted_test_mode: skip
    tests:
    - names:
      - CudaReproTests::test_mm_out_dtype_compile
      mode: mandatory_success
      tags:
      - inductor
      - fp16
      edits:
        dtypes:
          include:
          - name: float16
          - name: float32
        inputs:
          args:
          - tensor:
              shape:
              - 1
              - 3
              dtype: float16
              device: spyre
              init: rand
    - names:
      - CudaReproTests::test_index_put_issue
      mode: mandatory_success
      tags:
      - inductor
      - fp16
      edits:
        dtypes:
          include:
          - name: float16
          - name: float32
        inputs:
          args:
          - tensor:
              shape:
              - 4
              - 512
              - 768
              dtype: float16
              device: spyre
              init: rand
    - names:
      - CudaReproTests::test_no_device_idx_repro_cudagraphs
      mode: mandatory_success
      tags:
      - inductor
      edits:
        dtypes:
          include:
          - name: float32
    - names:
      - CudaReproTests::test_issue97695_1input
      mode: mandatory_success
      tags:
      - inductor
      edits:
        dtypes:
          include:
          - name: float32
    - names:
      - CudaReproTests::test_issue97695_2input
      mode: mandatory_success
      tags:
      - inductor
      edits:
        dtypes:
          include:
          - name: float32
  global:
    devices:
    - spyre
    supported_dtypes:
    - name: float16
    - name: float32
    supported_ops: []
