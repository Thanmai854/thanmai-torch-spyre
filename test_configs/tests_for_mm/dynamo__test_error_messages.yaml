test_suite_config:
  files:
  - path: ${PYTORCH_ROOT}/test/dynamo/test_error_messages.py
    unlisted_test_mode: skip
    tests:
    - names:
      - ErrorMessagesTest::test_cpp_extension_recommends_custom_ops
      mode: mandatory_success
      tags:
      - dynamo
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
          args:
          - tensor:
              shape:
              - 2
              - 2
              dtype: float16
              device: spyre
              init: rand
    - names:
      - ErrorMessagesTest::test_graph_break_traceback_above_dynamo_shows_user_code
      mode: mandatory_success
      tags:
      - dynamo
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
          args:
          - tensor:
              shape:
              - 3
              dtype: float16
              device: spyre
              init: rand
  global:
    devices:
    - spyre
    supported_dtypes:
    - name: float16
    - name: float32
    supported_ops: []
