test_suite_config:
  files:
  - path: ${PYTORCH_ROOT}/test/nn/test_parametrization.py
    unlisted_test_mode: skip
    tests:
    - names:
      - TestNNParametrization::test_initialization_parametrization
      mode: mandatory_success
      tags:
      - nn
      edits:
        dtypes:
          include:
          - name: float16
    - names:
      - TestNNParametrization::test_register_and_remove_nested_parametrization
      mode: mandatory_success
      tags:
      - nn
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
          args:
          - tensor:
              shape:
              - 8
              - 8
              dtype: float16
              device: spyre
              init: rand
    - names:
      - TestNNParametrization::test_caching_parametrization
      mode: mandatory_success
      tags:
      - nn
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
          args:
          - tensor:
              shape:
              - 5
              - 5
              dtype: float16
              device: spyre
              init: rand
  global:
    devices:
    - spyre
    supported_dtypes:
    - name: float16
    - name: float32
    supported_ops: []
