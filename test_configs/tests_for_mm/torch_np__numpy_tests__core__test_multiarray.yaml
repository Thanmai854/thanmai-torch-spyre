test_suite_config:
  files:
  - path: ${PYTORCH_ROOT}/test/torch_np/numpy_tests/core/test_multiarray.py
    unlisted_test_mode: skip
    tests:
    - names:
      - TestFromBuffer::test_mmap_close
      mode: mandatory_success
      tags:
      - torch_np
      edits:
        dtypes:
          include:
          - name: float32
        inputs:
          args:
          - tensor:
              shape:
              - 4
              - 5
              dtype: float16
              device: spyre
              init: rand
    - names:
      - TestMethods::test_arr_mult
      mode: mandatory_success
      tags:
      - torch_np
      edits:
        dtypes:
          include:
          - name: float32
        inputs:
          args:
          - tensor:
              shape:
              - 24
              dtype: float16
              device: spyre
              init: rand
    - names:
      - TestIO::test_fromstring_count0
      mode: mandatory_success
      tags:
      - torch_np
      edits:
        dtypes:
          include:
          - name: float16
    - names:
      - TestIO::test_parsing_subarray_unsupported
      mode: mandatory_success
      tags:
      - torch_np
      edits:
        dtypes:
          include:
          - name: float32
    - names:
      - TestIO::test_string
      mode: mandatory_success
      tags:
      - torch_np
      edits:
        dtypes:
          include:
          - name: float32
    - names:
      - TestInner::test_3d_tensor
      mode: mandatory_success
      tags:
      - torch_np
      edits:
        dtypes:
          include:
          - name: float32
        inputs:
          args:
          - tensor:
              shape:
              - 24
              dtype: float16
              device: spyre
              init: rand
    - names:
      - TestInner::test_inner_product_with_various_contiguities
      mode: mandatory_success
      tags:
      - torch_np
      edits:
        dtypes:
          include:
          - name: float32
        inputs:
          args:
          - tensor:
              shape:
              - 2
              - 2
              dtype: float16
              device: spyre
              init: rand
    - names:
      - TestIO::test_tofile_format
      mode: mandatory_success
      tags:
      - torch_np
      edits:
        dtypes:
          include:
          - name: float32
    - names:
      - TestIO::test_tofile_sep
      mode: mandatory_success
      tags:
      - torch_np
      edits:
        dtypes:
          include:
          - name: float32
    - names:
      - TestIO::test_dtype_bool
      mode: mandatory_success
      tags:
      - torch_np
      edits:
        dtypes:
          include:
          - name: float32
        inputs:
          args:
          - tensor:
              shape:
              - 2
              - 3
              - 4
              dtype: float16
              device: spyre
              init: rand
    - names:
      - TestIO::test_counted_string
      mode: mandatory_success
      tags:
      - torch_np
      edits:
        dtypes:
          include:
          - name: float32
  global:
    devices:
    - spyre
    supported_dtypes:
    - name: float16
    - name: float32
    supported_ops: []
