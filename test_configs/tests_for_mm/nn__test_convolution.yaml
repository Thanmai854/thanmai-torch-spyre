test_suite_config:
  files:
  - path: ${PYTORCH_ROOT}/test/nn/test_convolution.py
    unlisted_test_mode: skip
    tests:
    - names:
      - TestConvolutionNN::test_conv_backcompat
      mode: mandatory_success
      tags:
      - nn
      edits:
        dtypes:
          include:
          - name: float32
        inputs:
          args:
          - tensor:
              shape:
              - 1
              - 1
              - 1
              - 1
              dtype: float16
              device: spyre
              init: rand
    - names:
      - TestConvolutionNNDeviceType::test_conv3d_same_padding
      mode: xfail
      tags:
      - nn
      edits:
        dtypes:
          include:
          - name: float32
        inputs:
          args:
          - tensor:
              shape:
              - 1
              - 1
              - 1
              - 2
              - 5
              dtype: float16
              device: spyre
              init: rand
  global:
    devices:
    - spyre
    supported_dtypes:
    - name: float16
    - name: float32
    supported_ops: []
