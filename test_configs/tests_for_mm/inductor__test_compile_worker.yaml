test_suite_config:
  files:
  - path: ${PYTORCH_ROOT}/test/inductor/test_compile_worker.py
    unlisted_test_mode: skip
    tests:
    - names:
      - TestTimer::test_spammy_calls
      mode: mandatory_success
      tags:
      - inductor
      edits:
        dtypes:
          include:
          - name: float32
        inputs:
          args:
          - tensor:
              shape:
              - 1000
              - 1000
              dtype: float16
              device: spyre
              init: rand
  global:
    devices:
    - spyre
    supported_dtypes:
    - name: float16
    - name: float32
    supported_ops: []
