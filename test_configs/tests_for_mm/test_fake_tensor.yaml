test_suite_config:
  files:
  - path: ${PYTORCH_ROOT}/test/test_fake_tensor.py
    unlisted_test_mode: skip
    tests:
    - names:
      - FakeTensorTest::test_suggest_memory_format_with_degenerate_dimensions
      mode: mandatory_success
      tags:
      - fake_tensor
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
          args:
          - tensor:
              shape:
              - 1
              - 1
              - 512
              dtype: float16
              device: spyre
              init: rand
  global:
    devices:
    - spyre
    supported_dtypes:
    - name: float16
    - name: float32
    supported_ops: []
