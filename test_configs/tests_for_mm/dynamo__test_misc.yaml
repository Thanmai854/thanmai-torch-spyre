test_suite_config:
  files:
  - path: ${PYTORCH_ROOT}/test/dynamo/test_misc.py
    unlisted_test_mode: skip
    tests:
    - names:
      - MiscTests::test_python_slice
      mode: mandatory_success
      tags:
      - dynamo
      edits:
        dtypes:
          include:
          - name: float32
        inputs:
          args:
          - tensor:
              shape:
              - 2
              - 3
              - 4
              - 5
              dtype: float16
              device: spyre
              init: rand
    - names:
      - MiscTests::test_module_complex_iter
      mode: mandatory_success
      tags:
      - dynamo
      edits:
        dtypes:
          include:
          - name: float16
    - names:
      - MiscTests::test_torch_guards_stack_frame_register_inlining_deep
      mode: mandatory_success
      tags:
      - dynamo
      edits:
        dtypes:
          include:
          - name: float16
    - names:
      - MiscTests::test_guards_cse_pass_single
      mode: mandatory_success
      tags:
      - dynamo
      edits:
        dtypes:
          include:
          - name: float16
    - names:
      - MiscTests::test_guards_cse_pass_multiple
      mode: mandatory_success
      tags:
      - dynamo
      edits:
        dtypes:
          include:
          - name: float16
    - names:
      - MiscTests::test_guard_function_builder_with_cse
      mode: mandatory_success
      tags:
      - dynamo
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
          args:
          - tensor:
              shape:
              - 4
              - 4
              dtype: float16
              device: spyre
              init: rand
    - names:
      - MiscTests::test_str_format_return2
      mode: mandatory_success
      tags:
      - dynamo
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
          args:
          - tensor:
              shape:
              - 1
              - 1
              - 8
              - 8
              dtype: float16
              device: spyre
              init: rand
    - names:
      - MiscTests::test_frozen_dict
      mode: mandatory_success
      tags:
      - dynamo
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
          args:
          - tensor:
              shape:
              - 4
              dtype: float16
              device: spyre
              init: rand
    - names:
      - MiscTests::test_tensor_item_capture
      mode: mandatory_success
      tags:
      - dynamo
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
          args:
          - tensor:
              shape:
              - 10
              - 10
              dtype: float16
              device: spyre
              init: rand
    - names:
      - MiscTests::test_torch_size_tensor_index_non_scalar
      mode: mandatory_success
      tags:
      - dynamo
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
          args:
          - tensor:
              shape:
              - 1
              - 1
              dtype: float16
              device: spyre
              init: rand
  global:
    devices:
    - spyre
    supported_dtypes:
    - name: float16
    - name: float32
    supported_ops: []
