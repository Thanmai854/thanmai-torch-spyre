test_suite_config:
  files:
  - path: ${PYTORCH_ROOT}/test/test_cuda_sanitizer.py
    unlisted_test_mode: skip
    tests:
    - names:
      - TestEventHandler::test_branch_sync
      mode: mandatory_success
      tags:
      - cuda_sanitizer
      edits:
        dtypes:
          include:
          - name: float16
    - names:
      - TestEventHandler::test_device_synchronize
      mode: mandatory_success
      tags:
      - cuda_sanitizer
      edits:
        dtypes:
          include:
          - name: float16
    - names:
      - TestMessages::test_ensure_exists
      mode: mandatory_success
      tags:
      - cuda_sanitizer
      edits:
        dtypes:
          include:
          - name: float16
  global:
    devices:
    - spyre
    supported_dtypes:
    - name: float16
    - name: float32
    supported_ops: []
