test_suite_config:
  files:
  - path: ${PYTORCH_ROOT}/test/torch_np/numpy_tests/core/test_indexing.py
    unlisted_test_mode: skip
    tests:
    - names:
      - TestIndexing::test_broken_sequence_not_nd_index
      mode: mandatory_success
      tags:
      - torch_np
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
          args:
          - tensor:
              shape:
              - 1
              dtype: float16
              device: spyre
              init: rand
  global:
    devices:
    - spyre
    supported_dtypes:
    - name: float16
    - name: float32
    supported_ops: []
