test_suite_config:
  files:
  - path: ${PYTORCH_ROOT}/test/inductor/test_aot_inductor.py
    unlisted_test_mode: skip
    tests:
    - names:
      - AOTInductorTestsTemplate::test_mm_out_dtype
      mode: mandatory_success
      tags:
      - inductor
      - fp16
      edits:
        dtypes:
          include:
          - name: float16
          - name: float32
          exclude:
          - name: bfloat16
            description: Not supported on Spyre
        inputs:
          args:
          - tensor:
              shape:
              - 32
              - 64
              dtype: float16
              device: spyre
              init: rand
    - names:
      - AOTInductorTestsTemplate::test_bmm_multiple_dynamic
      mode: mandatory_success
      tags:
      - inductor
      edits:
        dtypes:
          include:
          - name: float16
