test_suite_config:
  files:
  - path: ${PYTORCH_ROOT}/test/test_tensorboard.py
    unlisted_test_mode: skip
    tests:
    - names:
      - TestTensorBoardSummaryWriter::test_summary_writer_ctx
      mode: mandatory_success
      tags:
      - tensorboard
      edits:
        dtypes:
          include:
          - name: float32
        inputs:
          args:
          - tensor:
              shape:
              - 3
              - 3
              - 5
              - 5
              dtype: float16
              device: spyre
              init: rand
    - names:
      - TestTensorBoardSummaryWriter::test_summary_writer_close
      mode: mandatory_success
      tags:
      - tensorboard
      edits:
        dtypes:
          include:
          - name: float32
        inputs:
          args:
          - tensor:
              shape:
              - 3
              - 3
              - 5
              - 5
              dtype: float16
              device: spyre
              init: rand
    - names:
      - TestTensorBoardSummary::test_histogram_doane
      mode: mandatory_success
      tags:
      - tensorboard
      edits:
        dtypes:
          include:
          - name: float32
    - names:
      - TestTensorBoardPytorchGraph::test_mlp_graph
      mode: mandatory_success
      tags:
      - tensorboard
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
          args:
          - tensor:
              shape:
              - 2
              - 1
              - 28
              - 28
              dtype: float16
