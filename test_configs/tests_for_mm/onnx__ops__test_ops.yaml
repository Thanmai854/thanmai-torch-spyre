test_suite_config:
  files:
  - path: ${PYTORCH_ROOT}/test/onnx/ops/test_ops.py
    unlisted_test_mode: skip
    tests:
    - names:
      - SymbolicOpsTest::test_symbolic_multi_out_is_exportable
      mode: mandatory_success
      tags:
      - onnx
      edits:
        dtypes:
          include:
          - name: float32
        inputs:
          args:
          - tensor:
              shape:
              - 1
              dtype: float16
              device: spyre
              init: rand
    - names:
      - SymbolicOpsTest::test_symbolic_is_exportable
      mode: mandatory_success
      tags:
      - onnx
      edits:
        dtypes:
          include:
          - name: float32
        inputs:
          args:
          - tensor:
              shape:
              - 1
              dtype: float16
              device: spyre
              init: rand
  global:
    devices:
    - spyre
    supported_dtypes:
    - name: float16
    - name: float32
    supported_ops: []
