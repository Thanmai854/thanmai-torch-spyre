test_suite_config:
  files:
  - path: ${PYTORCH_ROOT}/test/inductor/test_fusion_regions.py
    unlisted_test_mode: skip
    tests:
    - names:
      - TestFusionRegionDetection::test_mm_not_in_fusion_region
      mode: mandatory_success
      tags:
      - inductor
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
          args:
          - tensor:
              shape:
              - 64
              - 64
              dtype: float16
              device: spyre
              init: rand
    - names:
      - TestFusionRegionDetection::test_strict_local_fusion_no_cross_mm
      mode: mandatory_success
      tags:
      - inductor
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
          args:
          - tensor:
              shape:
              - 64
              - 64
              dtype: float16
              device: spyre
              init: rand
  global:
    devices:
    - spyre
    supported_dtypes:
    - name: float16
    - name: float32
    supported_ops: []
