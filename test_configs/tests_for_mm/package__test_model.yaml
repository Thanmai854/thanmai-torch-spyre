test_suite_config:
  files:
  - path: ${PYTORCH_ROOT}/test/package/test_model.py
    unlisted_test_mode: skip
    tests:
    - names:
      - ModelTest::test_model_save
      mode: mandatory_success
      tags:
      - package
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
          args:
          - tensor:
              shape:
              - 1
              - 3
              - 224
              - 224
              dtype: float16
              device: spyre
              init: rand
  global:
    devices:
    - spyre
    supported_dtypes:
    - name: float16
    - name: float32
    supported_ops: []
