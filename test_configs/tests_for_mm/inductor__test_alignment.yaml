test_suite_config:
  files:
  - path: ${PYTORCH_ROOT}/test/inductor/test_alignment.py
    unlisted_test_mode: skip
    tests:
    - names:
      - CommonTemplate::test_alignment_without_custom_op
      mode: mandatory_success
      tags:
      - inductor
      edits:
        dtypes:
          include:
          - name: float16
    - names:
      - CommonTemplate::test_slice
      mode: mandatory_success
      tags:
      - inductor
      - fp16
      edits:
        dtypes:
          include:
          - name: float16
          - name: float32
          exclude:
          - name: bfloat16
            description: Not supported on Spyre
        inputs:
          args:
          - tensor:
              shape:
              - 1025
              dtype: float16
              device: spyre
              init: rand
    - names:
      - CommonTemplate::test_view_dtype_slice
      mode: mandatory_success
      tags:
      - inductor
      - fp16
      edits:
        dtypes:
          include:
          - name: float16
          - name: float32
          exclude:
          - name: bfloat16
            description: Not supported on Spyre
    - names:
      - CommonTemplate::test_slice_view_dtype
      mode: mandatory_success
      tags:
      - inductor
      - fp16
      edits:
        dtypes:
          include:
          - name: float16
          - name: float32
          exclude:
          - name: bfloat16
            description: Not supported on Spyre
  global:
    devices:
    - spyre
    supported_dtypes:
    - name: float16
    - name: float32
    supported_ops: []
