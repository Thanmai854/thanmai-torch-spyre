test_suite_config:
  files:
  - path: ${PYTORCH_ROOT}/test/torch_np/numpy_tests/linalg/test_linalg.py
    unlisted_test_mode: skip
    tests:
    - names:
      - TestMatrixRank::test_symmetric_rank
      mode: mandatory_success
      tags:
      - torch_np
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
          args:
          - tensor:
              shape:
              - 4
              - 4
              dtype: float16
              device: spyre
              init: rand
    - names:
      - TestMultiDot::test_dynamic_programming_optimization_and_out
      mode: mandatory_success
      tags:
      - torch_np
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
          args:
          - tensor:
              shape:
              - 6
              - 1
              dtype: float16
              device: spyre
              init: rand
    - names:
      - TestMultiDot::test_dynamic_programming_logic
      mode: mandatory_success
      tags:
      - torch_np
      edits:
        dtypes:
          include:
          - name: float16
    - names:
      - TestMisc2::test_unsupported_commontype
      mode: mandatory_success
      tags:
      - torch_np
      - fp16
      edits:
        dtypes:
          include:
          - name: float16
          - name: float32
        inputs:
          args:
          - tensor:
              shape:
              - 2
              - 2
              dtype: float16
              device: spyre
              init: rand
    - names:
      - TestMultiDot::test_basic_function_with_dynamic_programming_optimization
      mode: mandatory_success
      tags:
      - torch_np
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
          args:
          - tensor:
              shape:
              - 6
              - 2
              dtype: float16
              device: spyre
              init: rand
    - names:
      - TestCholesky::test_basic_property
      mode: mandatory_success
      tags:
      - torch_np
      edits:
        dtypes:
          include:
          - name: float32
        inputs:
          args:
          - tensor:
              shape:
              - 1
              - 1
              dtype: float16
              device: spyre
              init: rand
    - names:
      - TestEigh::test_invalid
      mode: mandatory_success
      tags:
      - torch_np
      edits:
        dtypes:
          include:
          - name: float32
        inputs:
          args:
          - tensor:
              shape:
              - 2
              - 2
              dtype: float16
              device: spyre
              init: rand
    - names:
      - TestEigvalsh::test_UPLO
      mode: mandatory_success
      tags:
      - torch_np
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
          args:
          - tensor:
              shape:
              - 2
              - 2
              dtype: float16
              device: spyre
              init: rand
    - names:
      - TestEigvalsh::test_invalid
      mode: mandatory_success
      tags:
      - torch_np
      edits:
        dtypes:
          include:
          - name: float32
        inputs:
          args:
          - tensor:
              shape:
              - 2
              - 2
              dtype: float16
              device: spyre
              init: rand
  global:
    devices:
    - spyre
    supported_dtypes:
    - name: float16
    - name: float32
    supported_ops: []
