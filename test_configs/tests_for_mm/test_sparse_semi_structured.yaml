test_suite_config:
  files:
  - path: ${PYTORCH_ROOT}/test/test_sparse_semi_structured.py
    unlisted_test_mode: skip
    tests:
    - names:
      - TestSparseSemiStructuredCUSPARSELT::test_sparse_semi_structured_scaled_mm_fp8
      mode: xfail
      tags:
      - sparse_semi_structured
      - fp16
      edits:
        dtypes:
          include:
          - name: float16
          - name: float32
          exclude:
          - name: bfloat16
            description: Not supported on Spyre
    - names:
      - TestSparseSemiStructuredCUSPARSELT::test_cslt_sparse_mm_alpha_compile_autotune
      mode: xfail
      tags:
      - sparse_semi_structured
      - fp16
      edits:
        dtypes:
          include:
          - name: float16
          - name: float32
          exclude:
          - name: bfloat16
            description: Not supported on Spyre
        inputs:
          args:
          - tensor:
              shape:
              - 128
              - 256
              dtype: float16
              device: spyre
              init: rand
    - names:
      - TestSparseSemiStructuredCUSPARSELT::test_csrc_cslt_sparse_mm_search
      mode: mandatory_success
      tags:
      - sparse_semi_structured
      edits:
        dtypes:
          include:
          - name: float32
        inputs:
          args:
          - tensor:
              shape:
              - 128
              - 128
              dtype: float16
              device: spyre
              init: rand
