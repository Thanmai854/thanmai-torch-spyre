test_suite_config:
  files:
  - path: ${PYTORCH_ROOT}/test/test_scaled_matmul_cuda.py
    unlisted_test_mode: skip
    tests:
    - names:
      - TestFP8Matmul::test_scaled_mm_vs_emulated
      mode: xfail
      tags:
      - scaled_matmul_cuda
      - fp16
      edits:
        dtypes:
          include:
          - name: float16
          - name: float32
          exclude:
          - name: bfloat16
            description: Not supported on Spyre
    - names:
      - TestFP8Matmul::test_scaled_grouped_gemm_3d_2d
      mode: mandatory_success
      tags:
      - scaled_matmul_cuda
      - fp16
      edits:
        dtypes:
          include:
          - name: float16
          - name: float32
          exclude:
          - name: bfloat16
            description: Not supported on Spyre
    - names:
      - TestFP8Matmul::test_scaled_mm_vs_emulated_row_wise
      mode: xfail
      tags:
      - scaled_matmul_cuda
      - fp16
      edits:
        dtypes:
          include:
          - name: float16
          - name: float32
          exclude:
          - name: bfloat16
            description: Not supported on Spyre
        inputs:
          args:
          - tensor:
              shape:
              - 128
              - 512
              - 256
              dtype: float16
              device: spyre
              init: rand
    - names:
      - TestFP8Matmul::test_scaled_grouped_gemm_3d_3d
      mode: mandatory_success
      tags:
      - scaled_matmul_cuda
      - fp16
      edits:
        dtypes:
          include:
          - name: float16
          - name: float32
          exclude:
          - name: bfloat16
            description: Not supported on Spyre
    - names:
      - TestFP8Matmul::test_scaled_grouped_gemm_2d_2d
      mode: mandatory_success
      tags:
      - scaled_matmul_cuda
      - fp16
      edits:
        dtypes:
          include:
          - name: float16
          - name: float32
          exclude:
          - name: bfloat16
            description: Not supported on Spyre
    - names:
      - TestFP8Matmul::test_scaled_grouped_gemm_2d_3d
      mode: mandatory_success
      tags:
      - scaled_matmul_cuda
      - fp16
      edits:
        dtypes:
          include:
          - name: float16
          - name: float32
          exclude:
          - name: bfloat16
            description: Not supported on Spyre
    - names:
      - TestFP8Matmul::test_scaled_mm_vs_emulated_block_wise_verify_small_shapes
      mode: mandatory_success
      tags:
      - scaled_matmul_cuda
      - fp16
      edits:
        dtypes:
          include:
          - name: float16
          - name: float32
          exclude:
          - name: bfloat16
            description: Not supported on Spyre
    - names:
      - TestFP8Matmul::test_scaled_mm_block_wise_numerics
      mode: mandatory_success
      tags:
      - scaled_matmul_cuda
      - fp16
      edits:
        dtypes:
          include:
          - name: float16
          - name: float32
          exclude:
          - name: bfloat16
            description: Not supported on Spyre
    - names:
      - TestFP8Matmul::test_scaled_mm_change_stride
      mode: xfail
      tags:
      - scaled_matmul_cuda
      - fp16
      edits:
        dtypes:
          include:
          - name: float16
          - name: float32
          exclude:
          - name: bfloat16
            description: Not supported on Spyre
    - names:
      - TestFP8Matmul::test_passed_swizzle_arrays
      mode: xfail
      tags:
      - scaled_matmul_cuda
      - fp16
      edits:
        dtypes:
          include:
          - name: float16
          - name: float32
          exclude:
          - name: bfloat16
            description: Not supported on Spyre
        inputs:
          args:
          - tensor:
              shape:
              - 1
              dtype: float16
              device: spyre
              init: rand
    - names:
      - TestFP8Matmul::test_float8_basics
      mode: xfail
      tags:
      - scaled_matmul_cuda
      - fp16
      edits:
        dtypes:
          include:
          - name: float16
          - name: float32
          exclude:
          - name: bfloat16
            description: Not supported on Spyre
  global:
    devices:
    - spyre
    supported_dtypes:
    - name: float16
    - name: float32
    supported_ops: []
