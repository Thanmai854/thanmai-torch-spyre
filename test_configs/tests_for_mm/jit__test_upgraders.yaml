test_suite_config:
  files:
  - path: ${PYTORCH_ROOT}/test/jit/test_upgraders.py
    unlisted_test_mode: skip
    tests:
    - names:
      - TestUpgraders::test_populated_test_upgrader_graph
      mode: mandatory_success
      tags:
      - jit
      edits:
        dtypes:
          include:
          - name: float16
    - names:
      - TestUpgraders::test_add_value_to_version_map
      mode: mandatory_success
      tags:
      - jit
      edits:
        dtypes:
          include:
          - name: float16
    - names:
      - TestUpgraders::test_aten_test_serialization
      mode: mandatory_success
      tags:
      - jit
      edits:
        dtypes:
          include:
          - name: float32
  global:
    devices:
    - spyre
    supported_dtypes:
    - name: float16
    - name: float32
    supported_ops: []
