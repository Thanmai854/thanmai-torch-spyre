test_suite_config:
  files:
  - path: ${PYTORCH_ROOT}/test/test_torch.py
    unlisted_test_mode: skip
    tests:
    - names:
      - TestTorchDeviceType::test_cummin_discontiguous
      mode: mandatory_success
      tags:
      - torch
      edits:
        dtypes:
          include:
          - name: float32
    - names:
      - TestTorch::test_bmm_multithreaded
      mode: mandatory_success
      tags:
      - torch
      edits:
        dtypes:
          include:
          - name: float32
    - names:
      - TestTorchDeviceType::test_cummax_discontiguous
      mode: mandatory_success
      tags:
      - torch
      edits:
        dtypes:
          include:
          - name: float32
    - names:
      - TestTorch::test_doc_template
      mode: mandatory_success
      tags:
      - torch
      - fp16
      edits:
        dtypes:
          include:
          - name: float16
          - name: float32
          exclude:
          - name: bfloat16
            description: Not supported on Spyre
    - names:
      - TestTorchDeviceType::test_bfloat16_neg_abs
      mode: xfail
      tags:
      - torch
      - fp16
      edits:
        dtypes:
          include:
          - name: float16
          - name: float32
          exclude:
          - name: bfloat16
            description: Not supported on Spyre
        inputs:
          args:
          - tensor:
              shape:
              - 256
              dtype: float16
              device: spyre
              init: rand
  global:
    devices:
    - spyre
    supported_dtypes:
    - name: float16
    - name: float32
    supported_ops: []
