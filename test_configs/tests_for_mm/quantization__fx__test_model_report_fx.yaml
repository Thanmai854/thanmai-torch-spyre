test_suite_config:
  files:
  - path: ${PYTORCH_ROOT}/test/quantization/fx/test_model_report_fx.py
    unlisted_test_mode: skip
    tests:
    - names:
      - TestFxModelReportObserver::test_single_batch_of_ones
      mode: mandatory_success
      tags:
      - quantization
      edits:
        dtypes:
          include:
          - name: float32
        inputs:
          args:
          - tensor:
              shape:
              - 1
              - 1
              - 5
              dtype: float16
              device: spyre
              init: rand
    - names:
      - TestFxModelReportObserver::test_observer_after_relu
      mode: mandatory_success
      tags:
      - quantization
      edits:
        dtypes:
          include:
          - name: float32
        inputs:
          args:
          - tensor:
              shape:
              - 15
              - 1
              - 5
              dtype: float16
              device: spyre
              init: rand
  global:
    devices:
    - spyre
    supported_dtypes:
    - name: float16
    - name: float32
    supported_ops: []
