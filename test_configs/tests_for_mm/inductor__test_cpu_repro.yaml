test_suite_config:
  files:
  - path: ${PYTORCH_ROOT}/test/inductor/test_cpu_repro.py
    unlisted_test_mode: skip
    tests:
    - names:
      - CPUReproTests::test_transpose_with_norm
      mode: mandatory_success
      tags:
      - inductor
      - fp16
      edits:
        dtypes:
          include:
          - name: float16
          - name: float32
          exclude:
          - name: bfloat16
            description: Not supported on Spyre
        inputs:
          args:
          - tensor:
              shape:
              - 128
              - 196
              - 256
              dtype: float16
              device: spyre
              init: rand
