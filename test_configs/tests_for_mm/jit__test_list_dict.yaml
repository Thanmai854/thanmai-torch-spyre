      - TestDict::test_type_annotation_missing_contained_type
      mode: mandatory_success
      tags:
      - jit
      edits:
        dtypes:
          include:
          - name: float16
    - names:
      - TestList::test_list_sort
      mode: mandatory_success
      tags:
      - jit
      edits:
        dtypes:
          include:
          - name: float16
  global:
    devices:
    - spyre
    supported_dtypes:
