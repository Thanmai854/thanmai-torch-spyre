test_suite_config:
  files:
  - path: ${PYTORCH_ROOT}/test/inductor/test_triton_kernels.py
    unlisted_test_mode: skip
    tests:
    - names:
      - KernelTests::test_triton_kernel_emulate_precision_mm_kernels_do_not_change
      mode: mandatory_success
      tags:
      - inductor
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
          args:
          - tensor:
              shape:
              - 512
              - 512
              dtype: float16
              device: spyre
              init: rand
    - names:
      - KernelTests::test_triton_kernel_fallback
      mode: mandatory_success
      tags:
      - inductor
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
          args:
          - tensor:
              shape:
              - 4
              - 4
              dtype: float16
              device: spyre
              init: rand
  global:
    devices:
    - spyre
    supported_dtypes:
    - name: float16
    - name: float32
    supported_ops: []
