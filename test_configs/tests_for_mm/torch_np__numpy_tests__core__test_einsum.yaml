test_suite_config:
  files:
  - path: ${PYTORCH_ROOT}/test/torch_np/numpy_tests/core/test_einsum.py
    unlisted_test_mode: skip
    tests:
    - names:
      - TestEinsum::test_einsum_sums_int64
      mode: mandatory_success
      tags:
      - torch_np
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
          args:
          - tensor:
              shape:
              - 1
              - 2
              dtype: float16
              device: spyre
              init: rand
    - names:
      - TestEinsumPath::test_edge_paths
      mode: mandatory_success
      tags:
      - torch_np
      edits:
        dtypes:
          include:
          - name: float16
