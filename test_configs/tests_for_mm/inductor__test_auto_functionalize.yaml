test_suite_config:
  files:
  - path: ${PYTORCH_ROOT}/test/inductor/test_auto_functionalize.py
    unlisted_test_mode: skip
    tests:
    - names:
      - AutoFunctionalizeTests::test_unbacked_auto_functionalize_op
      mode: mandatory_success
      tags:
      - inductor
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
          args:
          - tensor:
              shape:
              - 100
              dtype: float16
              device: spyre
              init: rand
    - names:
      - AutoFunctionalizeTests::test_alias_id_output
      mode: mandatory_success
      tags:
      - inductor
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
          args:
          - tensor:
              shape:
              - 2
              - 2
              dtype: float16
              device: spyre
              init: rand
  global:
    devices:
    - spyre
    supported_dtypes:
    - name: float16
    - name: float32
    supported_ops: []
