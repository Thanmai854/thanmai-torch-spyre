test_suite_config:
  files:
  - path: ${PYTORCH_ROOT}/test/package/test_importer.py
    unlisted_test_mode: skip
    tests:
    - names:
      - TestImporter::test_ordered_importer_whichmodule
      mode: mandatory_success
      tags:
      - package
      - fp16
      edits:
        dtypes:
          include:
          - name: float16
          - name: float32
  global:
    devices:
    - spyre
    supported_dtypes:
    - name: float16
    - name: float32
    supported_ops: []
