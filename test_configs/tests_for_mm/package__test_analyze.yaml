test_suite_config:
  files:
  - path: ${PYTORCH_ROOT}/test/package/test_analyze.py
    unlisted_test_mode: skip
    tests:
    - names:
      - TestAnalyze::test_trace_dependencies
      mode: mandatory_success
      tags:
      - package
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
          args:
          - tensor:
              shape:
              - 4
              dtype: float16
              device: spyre
              init: rand
  global:
    devices:
    - spyre
    supported_dtypes:
    - name: float16
    - name: float32
    supported_ops: []
