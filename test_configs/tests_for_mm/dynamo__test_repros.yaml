test_suite_config:
  files:
  - path: ${PYTORCH_ROOT}/test/dynamo/test_repros.py
    unlisted_test_mode: skip
    tests:
    - names:
      - ReproTests::test_partitioner_cse_respects_mutation_boundaries
      mode: mandatory_success
      tags:
      - dynamo
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
          args:
          - tensor:
              shape:
              - 3
              dtype: float16
              device: spyre
              init: rand
    - names:
      - ReproTests::test_dont_dce_rand
      mode: mandatory_success
      tags:
      - dynamo
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
          args:
          - tensor:
              shape:
              - 2
              - 12
              - 16
              - 32
              - 32
              dtype: float16
              device: spyre
              init: rand
  global:
    devices:
    - spyre
    supported_dtypes:
    - name: float16
    - name: float32
    supported_ops: []
