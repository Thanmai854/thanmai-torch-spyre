test_suite_config:
  files:
  - path: ${PYTORCH_ROOT}/test/inductor/test_snode_runtime.py
    unlisted_test_mode: skip
    tests:
    - names:
      - ComputeBoundedTests::test_mm
      mode: mandatory_success
      tags:
      - inductor
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
          args:
          - tensor:
              shape:
              - 10
              - 10
              dtype: float16
              device: spyre
              init: rand
