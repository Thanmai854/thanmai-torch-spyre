test_suite_config:
  files:
  - path: ${PYTORCH_ROOT}/test/dynamo/test_dynamo_runtime_assert.py
    unlisted_test_mode: skip
    tests:
    - names:
      - RuntimeAssertCompileTimeTests::test_insert_runtime_assert_pass_time
      mode: mandatory_success
      tags:
      - dynamo
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
          args:
          - tensor:
              shape:
              - 8
              - 128
              dtype: float16
              device: spyre
              init: rand
  global:
    devices:
    - spyre
    supported_dtypes:
    - name: float16
    - name: float32
    supported_ops: []
