test_suite_config:
  files:
  - path: ${PYTORCH_ROOT}/test/inductor/test_inductor_scheduler.py
    unlisted_test_mode: skip
    tests:
    - names:
      - TestScoreFusionMemory::test_partial_overlap_below_threshold
      mode: mandatory_success
      tags:
      - inductor
      - fp16
      edits:
        dtypes:
          include:
          - name: float16
          - name: float32
        inputs:
          args:
          - tensor:
              shape:
              - 8
              - 128
              dtype: float16
              device: spyre
              init: rand
  global:
    devices:
    - spyre
    supported_dtypes:
    - name: float16
    - name: float32
    supported_ops: []
