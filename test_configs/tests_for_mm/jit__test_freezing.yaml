test_suite_config:
  files:
  - path: ${PYTORCH_ROOT}/test/jit/test_freezing.py
    unlisted_test_mode: skip
    tests:
    - names:
      - TestFreezing::test_freeze_module_with_aliased_tensor_attr
      mode: mandatory_success
      tags:
      - jit
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
          args:
          - tensor:
              shape:
              - 1
              - 2
              - 3
              - 4
              - 5
              - 6
              dtype: float16
              device: spyre
              init: rand
  global:
    devices:
    - spyre
    supported_dtypes:
    - name: float16
    - name: float32
    supported_ops: []
