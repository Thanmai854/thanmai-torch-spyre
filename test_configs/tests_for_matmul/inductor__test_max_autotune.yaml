test_suite_config:
  files:
  - path: ${PYTORCH_ROOT}/test/inductor/test_max_autotune.py
    unlisted_test_mode: skip
    tests:
    - names:
      - TestEpilogueFusionStaticAnalysis::test_template_epilogue_fusion_static_analysis
      mode: mandatory_success
      tags:
      - inductor
      edits:
        dtypes:
          include:
          - name: float16
    - names:
      - TestPrologueFusion::test_low_precision
      mode: mandatory_success
      tags:
      - inductor
      - fp16
      edits:
        dtypes:
          include:
          - name: float16
          - name: float32
          exclude:
          - name: bfloat16
            description: Not supported on Spyre
    - names:
      - TestMaxAutotune::test_triton_template_generated_code_caching_mm_plus_mm
      mode: mandatory_success
      tags:
      - inductor
      edits:
        dtypes:
          include:
          - name: float32
        inputs:
          args:
          - tensor:
              shape:
              - 10
              - 40
              dtype: float16
              device: spyre
              init: rand
    - names:
      - TestMaxAutotune::test_max_autotune_decompose_k
      mode: mandatory_success
      tags:
      - inductor
      - fp16
      edits:
        dtypes:
          include:
          - name: float16
          - name: float32
          exclude:
          - name: bfloat16
            description: Not supported on Spyre
    - names:
      - TestMaxAutotune::test_baddmm
      mode: mandatory_success
      tags:
      - inductor
      - fp16
      edits:
        dtypes:
          include:
          - name: float16
          - name: float32
        inputs:
          args:
          - tensor:
              shape:
              - 64
              - 1
              - 192
              dtype: float16
              device: spyre
              init: rand
    - names:
      - TestMaxAutotune::test_honor_sm_carveout_with_triton_tma
      mode: mandatory_success
      tags:
      - inductor
      - fp16
      edits:
        dtypes:
          include:
          - name: float16
          - name: float32
          exclude:
          - name: bfloat16
            description: Not supported on Spyre
        inputs:
          args:
          - tensor:
              shape:
              - 1
              dtype: float16
              device: spyre
              init: rand
    - names:
      - TestMaxAutotune::test_max_autotune_addmm_tma_dynamic_outer_dim
      mode: mandatory_success
      tags:
      - inductor
      - fp16
      edits:
        dtypes:
          include:
          - name: float16
          - name: float32
    - names:
      - TestMaxAutotune::test_max_autotune_addmm_persistent_tma_illegal_alignment
      mode: mandatory_success
      tags:
      - inductor
      - fp16
      edits:
        dtypes:
          include:
          - name: float16
          - name: float32
    - names:
      - TestMaxAutotune::test_max_autotune_regular_mm_tma_dynamic_outer_dim
      mode: mandatory_success
      tags:
      - inductor
      - fp16
      edits:
        dtypes:
          include:
          - name: float16
          - name: float32
    - names:
      - TestMaxAutotune::test_max_autotune_regular_mm_persistent_tma_illegal_output_alignment
      mode: mandatory_success
      tags:
      - inductor
      - fp16
      edits:
        dtypes:
          include:
          - name: float16
          - name: float32
    - names:
      - TestMaxAutotune::test_max_autotune_regular_mm_persistent_tma_illegal_alignment
      mode: mandatory_success
      tags:
      - inductor
      - fp16
      edits:
        dtypes:
          include:
          - name: float16
          - name: float32
  global:
    devices:
    - spyre
    supported_dtypes:
    - name: float16
    - name: float32
    supported_ops: []
