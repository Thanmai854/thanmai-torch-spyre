test_suite_config:
  files:
  - path: ${PYTORCH_ROOT}/test/test_tensorexpr_pybind.py
    unlisted_test_mode: skip
    tests:
    - names:
      - TestTensorExprPyBind::test_external_calls
      mode: mandatory_success
      tags:
      - tensorexpr_pybind
      edits:
        dtypes:
          include:
          - name: float32
        inputs:
          args:
          - tensor:
              shape:
              - 1
              - 1
              dtype: float16
              device: spyre
              init: rand
  global:
    devices:
    - spyre
    supported_dtypes:
    - name: float16
    - name: float32
    supported_ops: []
