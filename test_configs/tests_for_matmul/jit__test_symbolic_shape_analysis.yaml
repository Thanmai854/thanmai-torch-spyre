test_suite_config:
  files:
  - path: ${PYTORCH_ROOT}/test/jit/test_symbolic_shape_analysis.py
    unlisted_test_mode: skip
    tests:
    - names:
      - TestSymbolicShapeAnalysis::test_shape_function_includes
      mode: mandatory_success
      tags:
      - jit
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
          args:
          - tensor:
              shape:
              - 1
              - 16
              - 5
              - 10
              dtype: float16
              device: spyre
              init: rand
  global:
    devices:
    - spyre
    supported_dtypes:
    - name: float16
    - name: float32
    supported_ops: []
