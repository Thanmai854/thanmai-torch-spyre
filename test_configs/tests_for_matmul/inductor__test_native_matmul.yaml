test_suite_config:
  files:
  - path: ${PYTORCH_ROOT}/test/inductor/test_native_matmul.py
    unlisted_test_mode: skip
    tests:
    - names:
      - TestTritonDotReduction::test_batchmatmul
      mode: mandatory_success
      tags:
      - inductor
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
          args:
          - tensor:
              shape:
              - 256
              - 128
              - 128
              dtype: float16
              device: spyre
              init: rand
    - names:
      - TestTritonDotReduction::test_matmul_fp16
      mode: mandatory_success
      tags:
      - inductor
      - fp16
      edits:
        dtypes:
          include:
          - name: float16
          - name: float32
    - names:
      - TestTritonDotReduction::test_matmul
      mode: mandatory_success
      tags:
      - inductor
      - fp16
      edits:
        dtypes:
          include:
          - name: float16
          - name: float32
        inputs:
          args:
          - tensor:
              shape:
              - 128
              - 128
              dtype: float16
              device: spyre
              init: rand
  global:
    devices:
    - spyre
    supported_dtypes:
    - name: float16
    - name: float32
    supported_ops: []
