test_suite_config:
  files:
  - path: ${PYTORCH_ROOT}/test/inductor/test_deterministic.py
    unlisted_test_mode: skip
    tests:
    - names:
      - DeterministicTest::test_mm_padding
      mode: mandatory_success
      tags:
      - inductor
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
          args:
          - tensor:
              shape:
              - 2049
              - 2049
              dtype: float16
              device: spyre
              init: rand
    - names:
      - DeterministicTest::test_max_autotune
      mode: mandatory_success
      tags:
      - inductor
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
          args:
          - tensor:
              shape:
              - 2048
              - 2048
              dtype: float16
              device: spyre
              init: rand
  global:
    devices:
    - spyre
    supported_dtypes:
    - name: float16
    - name: float32
    supported_ops: []
