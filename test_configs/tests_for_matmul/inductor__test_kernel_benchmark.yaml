test_suite_config:
  files:
  - path: ${PYTORCH_ROOT}/test/inductor/test_kernel_benchmark.py
    unlisted_test_mode: skip
    tests:
    - names:
      - TestKernelBenchmark::test_matmul_triton_kernel_benchmark
      mode: mandatory_success
      tags:
      - inductor
      - fp16
      edits:
        dtypes:
          include:
          - name: float16
          - name: float32
    - names:
      - TestKernelBenchmark::test_matmul_bandwidth_computation
      mode: mandatory_success
      tags:
      - inductor
      edits:
        dtypes:
          include:
          - name: float32
  global:
    devices:
    - spyre
    supported_dtypes:
    - name: float16
    - name: float32
    supported_ops: []
