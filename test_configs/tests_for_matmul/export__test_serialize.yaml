test_suite_config:
  files:
  - path: ${PYTORCH_ROOT}/test/export/test_serialize.py
    unlisted_test_mode: skip
    tests:
    - names:
      - TestSerialize::test_serialize_infinite_sym_int
      mode: mandatory_success
      tags:
      - export
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
          args:
          - tensor:
              shape:
              - 2
              - 4
              dtype: float16
              device: spyre
              init: rand
  global:
    devices:
    - spyre
    supported_dtypes:
    - name: float16
    - name: float32
    supported_ops: []
