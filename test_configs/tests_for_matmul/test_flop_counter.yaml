test_suite_config:
  files:
  - path: ${PYTORCH_ROOT}/test/test_flop_counter.py
    unlisted_test_mode: skip
    tests:
    - names:
      - TestFlopCounter::test_flop_counter_variety
      mode: mandatory_success
      tags:
      - flop_counter
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
          args:
          - tensor:
              shape:
              - 4
              - 5
              dtype: float16
              device: spyre
              init: rand
  global:
    devices:
    - spyre
    supported_dtypes:
    - name: float16
    - name: float32
    supported_ops: []
