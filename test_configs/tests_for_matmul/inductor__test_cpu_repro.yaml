test_suite_config:
  files:
  - path: ${PYTORCH_ROOT}/test/inductor/test_cpu_repro.py
    unlisted_test_mode: skip
    tests:
    - names:
      - CPUReproTests::test_in_out_buffer
      mode: mandatory_success
      tags:
      - inductor
      edits:
        dtypes:
          include:
          - name: float32
        inputs:
          args:
          - tensor:
              shape:
              - 1
              - 2
              - 8
              - 4
              dtype: float16
              device: spyre
              init: rand
  global:
    devices:
    - spyre
    supported_dtypes:
    - name: float16
    - name: float32
    supported_ops: []
