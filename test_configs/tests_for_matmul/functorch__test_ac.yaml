test_suite_config:
  files:
  - path: ${PYTORCH_ROOT}/test/functorch/test_ac.py
    unlisted_test_mode: skip
    tests:
    - names:
      - MemoryBudgetTest::test_prioritize_cheaper_matmul
      mode: mandatory_success
      tags:
      - functorch
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
          args:
          - tensor:
              shape:
              - 1
              - 4
              dtype: float16
              device: spyre
              init: rand
    - names:
      - MemoryBudgetTest::test_prioritize_cheaper_matmul2
      mode: mandatory_success
      tags:
      - functorch
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
          args:
          - tensor:
              shape:
              - 4
              - 4
              dtype: float16
              device: spyre
              init: rand
    - names:
      - MemoryBudgetTest::test_matmul_uneven_chain
      mode: mandatory_success
      tags:
      - functorch
      edits:
        dtypes:
          include:
          - name: float16
    - names:
      - MemoryBudgetTest::test_matmul_even_chain
      mode: mandatory_success
      tags:
      - functorch
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
          args:
          - tensor:
              shape:
              - 512
              - 512
              dtype: float16
              device: spyre
              init: rand
  global:
    devices:
    - spyre
    supported_dtypes:
    - name: float16
    - name: float32
    supported_ops: []
