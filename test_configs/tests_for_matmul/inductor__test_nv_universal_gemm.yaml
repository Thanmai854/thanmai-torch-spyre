test_suite_config:
  files:
  - path: ${PYTORCH_ROOT}/test/inductor/test_nv_universal_gemm.py
    unlisted_test_mode: skip
    tests:
    - names:
      - TestNVUniversalGemm::test_matmul
      mode: mandatory_success
      tags:
      - inductor
      - fp16
      edits:
        dtypes:
          include:
          - name: float16
          - name: float32
          exclude:
          - name: bfloat16
            description: Not supported on Spyre
  global:
    devices:
    - spyre
    supported_dtypes:
    - name: float16
    - name: float32
    supported_ops: []
