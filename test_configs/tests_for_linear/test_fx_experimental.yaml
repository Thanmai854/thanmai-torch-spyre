test_suite_config:
  files:
  - path: ${PYTORCH_ROOT}/test/test_fx_experimental.py
    unlisted_test_mode: skip
    tests:
    - names:
      - TestFXExperimental::test_split_module_default_arg
      mode: mandatory_success
      tags:
      - fx_experimental
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
          args:
          - tensor:
              shape:
              - 50
              - 512
              dtype: float16
              device: spyre
              init: rand
