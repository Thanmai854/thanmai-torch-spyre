test_suite_config:
  files:
  - path: ${PYTORCH_ROOT}/test/test_utils.py
    unlisted_test_mode: skip
    tests:
    - names:
      - TestDeviceUtils::test_nn_module
      mode: mandatory_success
      tags:
      - utils
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
          args:
          - tensor:
              shape:
              - 2
              - 2
              dtype: float16
              device: spyre
              init: rand
    - names:
      - TestCheckpoint::test_checkpoint_module_list
      mode: mandatory_success
      tags:
      - utils
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
          args:
          - tensor:
              shape:
              - 1
              - 100
              dtype: float16
              device: spyre
              init: rand
  global:
    devices:
    - spyre
    supported_dtypes:
    - name: float16
    - name: float32
    supported_ops: []
