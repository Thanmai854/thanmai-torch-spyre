test_suite_config:
  files:
  - path: ${PYTORCH_ROOT}/test/onnx/test_pytorch_onnx_onnxruntime.py
    unlisted_test_mode: skip
    tests:
    - names:
      - TestONNXRuntime::test_linear
      mode: mandatory_success
      tags:
      - onnx
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
          args:
          - tensor:
              shape:
              - 1
              dtype: float16
              device: spyre
              init: rand
    - names:
      - TestONNXRuntime::test_quantized_linear
      mode: mandatory_success
      tags:
      - onnx
      edits:
        dtypes:
          include:
          - name: float32
        inputs:
          args:
          - tensor:
              shape:
              - 16
              dtype: float16
              device: spyre
              init: rand
    - names:
      - TestONNXRuntime::test_qat_linear_relu_fused
      mode: mandatory_success
      tags:
      - onnx
      edits:
        dtypes:
          include:
          - name: float16
    - names:
      - TestONNXRuntime::test_interpolate_no_shape
      mode: mandatory_success
      tags:
      - onnx
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
          args:
          - tensor:
              shape:
              - 1
              - 2
              - 4
              - 4
              dtype: float16
              device: spyre
              init: rand
    - names:
      - TestONNXRuntime::test_lstm_sequence
      mode: mandatory_success
      tags:
      - onnx
      edits:
        dtypes:
          include:
          - name: float32
        inputs:
          args:
          - tensor:
              shape:
              - 1
              - 100
              - 8
              dtype: float16
              device: spyre
              init: rand
    - names:
      - TestONNXRuntime::test_weight_norm
      mode: mandatory_success
      tags:
      - onnx
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
          args:
          - tensor:
              shape:
              - 1
              - 1
              - 5
              dtype: float16
              device: spyre
              init: rand
    - names:
      - TestONNXRuntime::test_weight_norm_nodim
      mode: mandatory_success
      tags:
      - onnx
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
          args:
          - tensor:
              shape:
              - 3
              - 4
              - 5
              dtype: float16
              device: spyre
              init: rand
    - names:
      - TestONNXRuntime::test_spectral_norm
      mode: mandatory_success
      tags:
      - onnx
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
          args:
          - tensor:
              shape:
              - 6
              - 2
              dtype: float16
              device: spyre
              init: rand
    - names:
      - TestONNXRuntime::test_glu
      mode: mandatory_success
      tags:
      - onnx
      edits:
        dtypes:
          include:
          - name: float32
        inputs:
          args:
          - tensor:
              shape:
              - 2
              - 4
              - 5
              - 6
              dtype: float16
              device: spyre
              init: rand
    - names:
      - TestONNXRuntime::test_fake_quantize_activation
      mode: mandatory_success
      tags:
      - onnx
      edits:
        dtypes:
          include:
          - name: float16
  global:
    devices:
    - spyre
    supported_dtypes:
    - name: float16
    - name: float32
    supported_ops: []
