test_suite_config:
  files:
  - path: ${PYTORCH_ROOT}/test/nn/test_pruning.py
    unlisted_test_mode: skip
    tests:
    - names:
      - TestPruningNN::test_pruning_id_consistency
      mode: mandatory_success
      tags:
      - nn
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
          args:
          - tensor:
              shape:
              - 5
              - 2
              dtype: float16
              device: spyre
              init: rand
    - names:
      - TestPruningNN::test_random_pruning_pickle
      mode: mandatory_success
      tags:
      - nn
      edits:
        dtypes:
          include:
