test_suite_config:
  files:
  - path: ${PYTORCH_ROOT}/test/test_jit_fuser_te.py
    unlisted_test_mode: skip
    tests:
    - names:
      - TestLoopnestRandomization::test_relu
      mode: xfail
      tags:
      - jit_fuser_te
      edits:
        dtypes:
          include:
          - name: float32
        inputs:
          args:
          - tensor:
              shape:
              - 4
              - 4
              dtype: float16
              device: spyre
              init: rand
    - names:
      - TestTEFuser::test_lerp
      mode: mandatory_success
      tags:
      - jit_fuser_te
      edits:
        dtypes:
          include:
          - name: float32
        inputs:
          args:
          - tensor:
              shape:
              - 1
              - 4
              dtype: float16
              device: spyre
              init: rand
  global:
    devices:
    - spyre
    supported_dtypes:
    - name: float16
    - name: float32
    supported_ops: []
