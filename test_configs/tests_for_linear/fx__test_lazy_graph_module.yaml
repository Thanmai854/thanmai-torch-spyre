test_suite_config:
  files:
  - path: ${PYTORCH_ROOT}/test/fx/test_lazy_graph_module.py
    unlisted_test_mode: skip
    tests:
    - names:
      - TestLazyGraphModule::test_to_folder_class
      mode: mandatory_success
      tags:
      - fx
      edits:
        dtypes:
          include:
          - name: float16
    - names:
      - TestLazyGraphModule::test_to_folder_sequential
      mode: mandatory_success
      tags:
      - fx
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
          args:
          - tensor:
              shape:
              - 100
              - 10
              dtype: float16
              device: spyre
              init: rand
  global:
    devices:
    - spyre
    supported_dtypes:
    - name: float16
    - name: float32
    supported_ops: []
