    tests:
    - names:
      - TestFuseEager::test_fusion_linear_bn_eval
      mode: mandatory_success
      tags:
      - quantization
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
          args:
          - tensor:
              shape:
              - 8
              - 20
              dtype: float16
              device: spyre
              init: rand
    - names:
      - TestFuseEager::test_fuse_function_customization
      mode: mandatory_success
      tags:
      - quantization
      edits:
        dtypes:
          include:
          - name: float16
  global:
    devices:
    - spyre
    supported_dtypes:
    - name: float16
    - name: float32
    supported_ops: []
