test_suite_config:
  files:
  - path: ${PYTORCH_ROOT}/test/dynamo/test_modules.py
    unlisted_test_mode: skip
    tests:
    - names:
      - OptimizedModuleTest::test_hooks_allowed_modules
      mode: mandatory_success
      tags:
      - dynamo
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
          args:
          - tensor:
              shape:
              - 20
              - 10
              dtype: float16
              device: spyre
              init: rand
    - names:
      - NNModuleTests::test_lazy_module_speculation_log_divergence
      mode: mandatory_success
      tags:
      - dynamo
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
          args:
          - tensor:
              shape:
              - 10
              - 3
              dtype: float16
              device: spyre
              init: rand
    - names:
