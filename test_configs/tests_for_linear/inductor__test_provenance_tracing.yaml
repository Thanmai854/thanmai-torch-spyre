test_suite_config:
  files:
  - path: ${PYTORCH_ROOT}/test/inductor/test_provenance_tracing.py
    unlisted_test_mode: skip
    tests:
    - names:
      - TestProvenanceTracingStackTraces::test_deferred_triton_kernels
      mode: mandatory_success
      tags:
      - inductor
      - fp16
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
          args:
          - tensor:
              shape:
              - 1
              - 512
              dtype: float16
              device: spyre
              init: rand
    - names:
      - ProvenanceTracingKernelContextTemplate::test_jit_inductor_with_flag
      mode: mandatory_success
      tags:
      - inductor
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
          args:
          - tensor:
              shape:
              - 10
              - 20
              dtype: float16
              device: spyre
              init: rand
    - names:
      - ProvenanceTracingKernelContextTemplate::test_aoti_python_stack_traces
      mode: mandatory_success
      tags:
      - inductor
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
          args:
          - tensor:
              shape:
              - 10
              - 20
              dtype: float16
              device: spyre
              init: rand
  global:
    devices:
    - spyre
    supported_dtypes:
    - name: float16
    - name: float32
    supported_ops: []
