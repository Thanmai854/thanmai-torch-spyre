test_suite_config:
  files:
  - path: ${PYTORCH_ROOT}/test/nn/test_parametrization.py
    unlisted_test_mode: skip
    tests:
    - names:
      - TestNNParametrization::test_transfer_parametrizations_and_params
      mode: mandatory_success
      tags:
      - nn
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
          args:
          - tensor:
              shape:
              - 5
              - 5
              dtype: float16
              device: spyre
              init: rand
    - names:
      - TestNNParametrization::test_transfer_parametrizations_and_params_right_inverse
      mode: mandatory_success
      tags:
      - nn
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
          args:
          - tensor:
              shape:
              - 5
              - 5
              dtype: float16
              device: spyre
              init: rand
    - names:
      - TestNNParametrization::test_transfer_parametrizations_and_params_single_param
      mode: mandatory_success
      tags:
      - nn
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
          args:
          - tensor:
              shape:
              - 5
              - 5
              dtype: float16
              device: spyre
              init: rand
    - names:
      - TestNNParametrization::test_transfer_parametrizations_and_params_many_to_one
