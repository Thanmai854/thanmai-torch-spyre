      - TestNNParametrization::test_weight_norm_pickle
      mode: mandatory_success
      tags:
      - nn
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
          args:
          - tensor:
              shape:
              - 4
              - 5
              dtype: float16
              device: spyre
              init: rand
    - names:
      - TestNNParametrization::test_weight_norm_deepcopy
      mode: mandatory_success
      tags:
      - nn
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
          args:
          - tensor:
              shape:
              - 3
              - 4
              dtype: float16
              device: spyre
              init: rand
    - names:
      - TestNNParametrization::test_wrapper_subclass_parametrization
      mode: mandatory_success
      tags:
      - nn
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
          args:
          - tensor:
              shape:
              - 2
              - 2
              dtype: float16
              device: spyre
              init: rand
    - names:
      - TestNNParametrizationDevice::test_weight_norm_parametrization
      mode: xfail
      tags:
      - nn
      - fp16
      edits:
        dtypes:
          include:
          - name: float16
          - name: float32
          exclude:
          - name: bfloat16
            description: Not supported on Spyre
        inputs:
          args:
          - tensor:
              shape:
              - 3
              - 4
              dtype: float16
              device: spyre
              init: rand
    - names:
      - TestNNParametrization::test_caching_parametrization
      mode: mandatory_success
      tags:
      - nn
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
