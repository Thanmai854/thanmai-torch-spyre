test_suite_config:
  files:
  - path: ${PYTORCH_ROOT}/test/dynamo/test_higher_order_ops.py
    unlisted_test_mode: skip
    tests:
    - names:
      - FuncTorchHigherOrderOpTests::test_linearize_jvp_fn
      mode: mandatory_success
      tags:
      - dynamo
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
          args:
          - tensor:
              shape:
              - 3
              - 3
              - 3
              dtype: float16
              device: spyre
              init: rand
