test_suite_config:
  files:
  - path: ${PYTORCH_ROOT}/test/profiler/test_memory_profiler.py
    unlisted_test_mode: skip
    tests:
    - names:
      - TestMemoryProfilerE2E::test_categories_e2e_sequential_fwd
      mode: mandatory_success
      tags:
      - profiler
      - softmax
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
          args:
          - tensor:
              shape:
              - 2
              - 2
              dtype: float16
              device: spyre
              init: rand
    - names:
      - TestMemoryProfilerE2E::test_categories_e2e_simple_module_fwd
      mode: mandatory_success
      tags:
      - profiler
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
          args:
          - tensor:
              shape:
              - 2
              - 2
              dtype: float16
              device: spyre
              init: rand
    - names:
      - TestMemoryProfilerE2E::test_inputs_fwd
      mode: mandatory_success
      tags:
      - profiler
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
          args:
          - tensor:
              shape:
              - 2
              - 2
              dtype: float16
              device: spyre
              init: rand
  global:
    devices:
    - spyre
    supported_dtypes:
    - name: float16
    - name: float32
    supported_ops:
    - name: softmax
      dtypes:
      - name: float16
        precision:
          atol: 0.001
          rtol: 0.001
