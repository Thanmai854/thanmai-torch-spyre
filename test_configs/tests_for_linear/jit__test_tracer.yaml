test_suite_config:
  files:
  - path: ${PYTORCH_ROOT}/test/jit/test_tracer.py
    unlisted_test_mode: skip
    tests:
    - names:
      - TestMixTracingScripting::test_trace_linear
      mode: mandatory_success
      tags:
      - jit
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
          args:
          - tensor:
              shape:
              - 20
              - 20
              dtype: float16
              device: spyre
              init: rand
    - names:
      - TestTracer::test_interpolate_trace
      mode: mandatory_success
      tags:
      - jit
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
          args:
          - tensor:
              shape:
              - 1
              - 1
              - 14
              - 14
              dtype: float16
              device: spyre
              init: rand
    - names:
      - TestTracer::test_trace_skip_none_submodule
      mode: mandatory_success
      tags:
      - jit
      edits:
        dtypes:
          include:
          - name: float16
    - names:
      - TestMixTracingScripting::test_trace_dict_mix_script
      mode: mandatory_success
      tags:
      - jit
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
          args:
          - tensor:
              shape:
              - 2
              - 2
              dtype: float16
              device: spyre
              init: rand
  global:
    devices:
    - spyre
    supported_dtypes:
    - name: float16
    - name: float32
    supported_ops: []
