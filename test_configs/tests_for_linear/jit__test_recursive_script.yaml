test_suite_config:
  files:
  - path: ${PYTORCH_ROOT}/test/jit/test_recursive_script.py
    unlisted_test_mode: skip
    tests:
    - names:
      - TestRecursiveScript::test_module_repr
      mode: mandatory_success
      tags:
      - jit
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
          args:
          - tensor:
              shape:
              - 10
              - 10
              - 3
              dtype: float16
              device: spyre
              init: rand
    - names:
      - TestRecursiveScript::test_optional_module
      mode: mandatory_success
      tags:
      - jit
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
          args:
          - tensor:
              shape:
              - 2
              - 2
              dtype: float16
              device: spyre
              init: rand
  global:
    devices:
    - spyre
    supported_dtypes:
    - name: float16
    - name: float32
    supported_ops: []
