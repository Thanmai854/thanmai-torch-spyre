test_suite_config:
  files:
  - path: ${PYTORCH_ROOT}/test/dynamo/test_logging.py
    unlisted_test_mode: skip
    tests:
    - names:
      - LoggingTests::test_ddp_graphs
      mode: mandatory_success
      tags:
      - dynamo
      edits:
        dtypes:
          include:
          - name: float32
        inputs:
          args:
          - tensor:
              shape:
              - 1024
              - 1024
              dtype: float16
              device: spyre
              init: rand
  global:
    devices:
    - spyre
    supported_dtypes:
    - name: float16
    - name: float32
    supported_ops: []
