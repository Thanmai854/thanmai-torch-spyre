test_suite_config:
  files:
  - path: ${PYTORCH_ROOT}/test/onnx/test_utility_funs.py
    unlisted_test_mode: skip
    tests:
    - names:
      - TestUtilityFuns::test_duplicated_output_node
      mode: mandatory_success
      tags:
      - onnx
      edits:
        dtypes:
          include:
          - name: float16
    - names:
      - TestUtilityFuns::test_onnx_node_naming
      mode: mandatory_success
      tags:
      - onnx
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
          args:
          - tensor:
              shape:
              - 1
              - 10
              dtype: float16
              device: spyre
              init: rand
    - names:
      - TestUtilityFuns::test_onnx_value_name
      mode: mandatory_success
      tags:
      - onnx
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
          args:
          - tensor:
              shape:
              - 3
              - 3
              dtype: float16
              device: spyre
              init: rand
    - names:
      - TestUtilityFuns::test_unused_initializers
      mode: mandatory_success
      tags:
      - onnx
      edits:
        dtypes:
          include:
          - name: float32
        inputs:
          args:
          - tensor:
              shape:
              - 20
              - 16
              - 50
              - 100
              dtype: float16
              device: spyre
              init: rand
  global:
    devices:
    - spyre
    supported_dtypes:
    - name: float16
    - name: float32
    supported_ops: []
