test_suite_config:
  files:
  - path: ${PYTORCH_ROOT}/test/quantization/core/test_workflow_module.py
    unlisted_test_mode: skip
    tests:
    - names:
      - TestFusedObsFakeQuantModule::test_embedding_qat_config
      mode: mandatory_success
      tags:
      - quantization
      edits:
        dtypes:
          include:
          - name: float32
    - names:
      - TestRecordHistogramObserver::test_record_observer
      mode: mandatory_success
      tags:
      - quantization
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
          args:
          - tensor:
              shape:
              - 3
              - 4
              dtype: float16
              device: spyre
              init: rand
  global:
    devices:
    - spyre
    supported_dtypes:
    - name: float16
    - name: float32
    supported_ops: []
