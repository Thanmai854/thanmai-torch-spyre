test_suite_config:
  files:
  - path: ${PYTORCH_ROOT}/test/jit/test_freezing.py
    unlisted_test_mode: skip
    tests:
    - names:
      - TestFrozenOptimizations::test_linear_bn_folding_autocast_scenario_cuda
      mode: mandatory_success
      tags:
      - jit
      - fp16
      edits:
        dtypes:
          include:
          - name: float16
          - name: float32
    - names:
      - TestFrozenOptimizations::test_linear_multiple_blocks
      mode: mandatory_success
      tags:
      - jit
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
          args:
          - tensor:
              shape:
              - 50
              - 5
              dtype: float16
              device: spyre
              init: rand
    - names:
      - TestFrozenOptimizations::test_linear_concat_complex
