test_suite_config:
  files:
  - path: ${PYTORCH_ROOT}/test/dynamo/test_hooks.py
    unlisted_test_mode: skip
    tests:
    - names:
      - HooksTests::test_no_recompile_on_same_hook
      mode: mandatory_success
      tags:
      - dynamo
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
          args:
          - tensor:
              shape:
              - 16
              - 16
              dtype: float16
              device: spyre
              init: rand
    - names:
      - HooksTests::test_nnmodule_hook_guards
      mode: mandatory_success
      tags:
      - dynamo
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
          args:
          - tensor:
              shape:
              - 16
              - 16
              dtype: float16
              device: spyre
              init: rand
    - names:
      - HooksTests::test_wrap_top_frame_with_hooks
      mode: mandatory_success
      tags:
      - dynamo
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
          args:
          - tensor:
              shape:
              - 18
              - 18
              dtype: float16
              device: spyre
              init: rand
  global:
    devices:
    - spyre
    supported_dtypes:
    - name: float16
    - name: float32
    supported_ops: []
