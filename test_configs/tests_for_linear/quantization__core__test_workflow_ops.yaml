    tests:
    - names:
      - TestFakeQuantizeOps::test_fake_quant_preserves_qparam_shapes_for_activations
      mode: mandatory_success
      tags:
      - quantization
      edits:
        dtypes:
          include:
          - name: float32
        inputs:
          args:
          - tensor:
              shape:
              - 4
              - 4
              - 4
              - 4
              dtype: float16
              device: spyre
              init: rand
  global:
