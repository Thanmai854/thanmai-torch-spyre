      mode: mandatory_success
      tags:
      - torch_np
      edits:
        dtypes:
          include:
          - name: float32
    - names:
      - TestInterp::test_non_finite_inf
      mode: mandatory_success
      tags:
      - torch_np
      edits:
        dtypes:
          include:
          - name: float32
    - names:
      - TestInterp::test_complex_interp
      mode: mandatory_success
      tags:
      - torch_np
      edits:
        dtypes:
          include:
          - name: float16
    - names:
      - TestInterp::test_if_len_x_is_small
      mode: mandatory_success
