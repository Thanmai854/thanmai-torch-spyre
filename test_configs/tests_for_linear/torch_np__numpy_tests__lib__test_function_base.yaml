      - TestDigitize::test_right_open_random
      mode: mandatory_success
      tags:
      - torch_np
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
          args:
          - tensor:
              shape:
              - 10
              dtype: float16
              device: spyre
              init: rand
    - names:
      - TestSinc::test_simple
      mode: mandatory_success
      tags:
      - torch_np
      edits:
        dtypes:
          include:
          - name: float32
    - names:
      - TestInterp::test_basic
      mode: mandatory_success
      tags:
      - torch_np
      edits:
        dtypes:
          include:
          - name: float32
    - names:
      - TestInterp::test_scalar_interpolation_point
      mode: mandatory_success
      tags:
      - torch_np
      edits:
        dtypes:
          include:
          - name: float32
    - names:
