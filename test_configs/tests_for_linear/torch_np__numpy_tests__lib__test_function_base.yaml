test_suite_config:
  files:
  - path: ${PYTORCH_ROOT}/test/torch_np/numpy_tests/lib/test_function_base.py
    unlisted_test_mode: skip
    tests:
    - names:
      - TestPercentile::test_linear_nan_1D
      mode: mandatory_success
      tags:
      - torch_np
      - fp16
      edits:
        dtypes:
          include:
          - name: float16
          - name: float32
    - names:
      - TestPercentile::test_linear_interpolation_extrapolation
      mode: mandatory_success
      tags:
      - torch_np
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
          args:
          - tensor:
              shape:
              - 5
              dtype: float16
              device: spyre
              init: rand
    - names:
      - TestPercentile::test_linear_interpolation
      mode: mandatory_success
      tags:
      - torch_np
      - fp16
      edits:
        dtypes:
          include:
          - name: float16
          - name: float32
    - names:
      - TestPercentile::test_sequence
      mode: mandatory_success
      tags:
      - torch_np
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
          args:
          - tensor:
              shape:
              - 8
              dtype: float16
              device: spyre
              init: rand
    - names:
      - TestVectorize::test_large
      mode: mandatory_success
      tags:
      - torch_np
      edits:
        dtypes:
          include:
          - name: float16
    - names:
      - TestDigitize::test_random
      mode: mandatory_success
      tags:
      - torch_np
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
