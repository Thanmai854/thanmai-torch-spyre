test_suite_config:
  files:
  - path: ${PYTORCH_ROOT}/test/functorch/test_control_flow.py
    unlisted_test_mode: skip
    tests:
    - names:
      - TestControlFlowTraced::test_while_loop_simple_with_linear_compile_check_graph
      mode: mandatory_success
      tags:
      - functorch
      edits:
        dtypes:
          include:
          - name: float32
        inputs:
          args:
          - tensor:
              shape:
              - 2
              - 2
              dtype: float16
              device: spyre
              init: rand
    - names:
      - TestControlFlowTraced::test_cond_simple_with_linear_compile_check_graph
      mode: mandatory_success
      tags:
      - functorch
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
          args:
          - tensor:
              shape:
              - 4
              dtype: float16
              device: spyre
              init: rand
    - names:
      - TestControlFlow::test_cond_autograd_torch_nn_module
      mode: mandatory_success
      tags:
      - functorch
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
          args:
          - tensor:
              shape:
              - 4
              dtype: float16
              device: spyre
              init: rand
    - names:
      - TestControlFlowTraced::test_compile_while_loop_stack_output
      mode: mandatory_success
      tags:
      - functorch
      edits:
        dtypes:
          include:
          - name: float16
  global:
    devices:
    - spyre
    supported_dtypes:
    - name: float16
    - name: float32
    supported_ops: []
