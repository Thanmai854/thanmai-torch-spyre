test_suite_config:
  files:
  - path: ${PYTORCH_ROOT}/test/dynamo/test_decorators.py
    unlisted_test_mode: skip
    tests:
    - names:
      - DecoratorTests::test_leaf_function_nested_output
      mode: mandatory_success
      tags:
      - dynamo
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
          args:
          - tensor:
              shape:
              - 3
              - 3
              dtype: float16
              device: spyre
              init: rand
