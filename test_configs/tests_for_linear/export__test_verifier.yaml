test_suite_config:
  files:
  - path: ${PYTORCH_ROOT}/test/export/test_verifier.py
    unlisted_test_mode: skip
    tests:
    - names:
      - TestVerifier::test_verifier_call_module
      mode: mandatory_success
      tags:
      - export
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
          args:
          - tensor:
              shape:
              - 10
              - 10
              dtype: float16
              device: spyre
              init: rand
    - names:
      - TestVerifier::test_ep_verifier_basic
      mode: mandatory_success
      tags:
      - export
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
          args:
          - tensor:
              shape:
              - 10
              - 10
              dtype: float16
              device: spyre
              init: rand
  global:
    devices:
    - spyre
    supported_dtypes:
    - name: float16
    - name: float32
    supported_ops: []
