test_suite_config:
  files:
  - path: ${PYTORCH_ROOT}/test/functorch/test_vmap.py
    unlisted_test_mode: skip
    tests:
    - names:
      - TestVmapAPI::test_nn_module
      mode: mandatory_success
      tags:
      - functorch
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
          args:
          - tensor:
              shape:
              - 2
              - 3
              dtype: float16
              device: spyre
              init: rand
    - names:
      - TestVmapOperatorsOpInfo::test_vmap_linalg_failure_1D_input
      mode: mandatory_success
      tags:
      - functorch
      edits:
        dtypes:
          include:
          - name: float32
  global:
    devices:
    - spyre
    supported_dtypes:
    - name: float16
    - name: float32
    supported_ops: []
