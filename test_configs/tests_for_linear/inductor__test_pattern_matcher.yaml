test_suite_config:
  files:
  - path: ${PYTORCH_ROOT}/test/inductor/test_pattern_matcher.py
    unlisted_test_mode: skip
    tests:
    - names:
      - TestPatternMatcher::test_addmm_broadcasting_bias
      mode: mandatory_success
      tags:
      - inductor
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
          args:
          - tensor:
              shape:
              - 1
              - 3
              - 4
              dtype: float16
              device: spyre
              init: rand
    - names:
      - TestPatternMatcher::test_addmm_dtype_mismatch
      mode: mandatory_success
      tags:
      - inductor
      - fp16
      edits:
        dtypes:
          include:
          - name: float16
          - name: float32
        inputs:
          args:
          - tensor:
              shape:
              - 1024
              - 1024
              dtype: float16
              device: spyre
              init: rand
  global:
    devices:
    - spyre
    supported_dtypes:
    - name: float16
    - name: float32
    supported_ops: []
