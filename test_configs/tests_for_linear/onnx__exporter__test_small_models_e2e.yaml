test_suite_config:
  files:
  - path: ${PYTORCH_ROOT}/test/onnx/exporter/test_small_models_e2e.py
    unlisted_test_mode: skip
    tests:
    - names:
      - DynamoExporterTest::test_export_of_static_dim_constraints
      mode: mandatory_success
      tags:
      - onnx
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
          args:
          - tensor:
              shape:
              - 3
              - 3
              dtype: float16
              device: spyre
              init: rand
  global:
    devices:
    - spyre
    supported_dtypes:
    - name: float16
    - name: float32
    supported_ops: []
