test_suite_config:
  files:
  - path: ${PYTORCH_ROOT}/test/test_jit_fuser.py
    unlisted_test_mode: skip
    tests:
    - names:
      - TestFuser::test_lerp
      mode: mandatory_success
      tags:
      - jit_fuser
      edits:
        dtypes:
          include:
          - name: float32
        inputs:
          args:
          - tensor:
              shape:
              - 1
              - 4
              dtype: float16
              device: spyre
              init: rand
  global:
    devices:
    - spyre
    supported_dtypes:
    - name: float16
    - name: float32
    supported_ops: []
