test_suite_config:
  files:
  - path: ${PYTORCH_ROOT}/test/torch_np/numpy_tests/lib/test_histograms.py
    unlisted_test_mode: skip
    tests:
    - names:
      - TestHistogram::test_simple
      mode: mandatory_success
      tags:
      - torch_np
      edits:
        dtypes:
          include:
          - name: float16
  global:
    devices:
    - spyre
    supported_dtypes:
    - name: float16
    - name: float32
    supported_ops: []
