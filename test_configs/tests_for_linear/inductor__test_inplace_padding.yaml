test_suite_config:
  files:
  - path: ${PYTORCH_ROOT}/test/inductor/test_inplace_padding.py
    unlisted_test_mode: skip
    tests:
    - names:
      - InplacePaddingTest::test_linear_and_cel_max_autotune
      mode: mandatory_success
      tags:
      - inductor
      - fp16
      edits:
        dtypes:
          include:
          - name: float16
          - name: float32
          exclude:
          - name: bfloat16
            description: Not supported on Spyre
  global:
    devices:
    - spyre
    supported_dtypes:
    - name: float16
    - name: float32
    supported_ops: []
