test_suite_config:
  files:
  - path: ${PYTORCH_ROOT}/test/dynamo/test_repros.py
    unlisted_test_mode: skip
    tests:
    - names:
      - ReproTests::test_ellipsis
      mode: mandatory_success
      tags:
      - dynamo
      - layer_norm
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
          args:
          - tensor:
              shape:
              - 2
              - 197
              - 256
              dtype: float16
              device: spyre
              init: rand
    - names:
      - ReproTests::test_optimized_deepcopy
      mode: mandatory_success
      tags:
      - dynamo
      edits:
        dtypes:
          include:
          - name: float32
        inputs:
          args:
          - tensor:
              shape:
              - 1
              - 2
              dtype: float16
              device: spyre
              init: rand
    - names:
      - ReproTests::test_modules
      mode: mandatory_success
      tags:
      - dynamo
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
          args:
          - tensor:
              shape:
              - 3
              - 3
              dtype: float16
              device: spyre
              init: rand
    - names:
      - ReproTests::test_many_views_with_mutation
