      edits:
        dtypes:
          include:
          - name: float16
        inputs:
          args:
          - tensor:
              shape:
              - 5
              - 10
              dtype: float16
              device: spyre
              init: rand
  global:
    devices:
    - spyre
    supported_dtypes:
    - name: float16
    - name: float32
    supported_ops:
    - name: layer_norm
      dtypes:
      - name: float16
        precision:
          atol: 0.001
          rtol: 0.001
