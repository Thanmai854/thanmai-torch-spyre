test_suite_config:
  files:
  - path: ${PYTORCH_ROOT}/test/test_throughput_benchmark.py
    unlisted_test_mode: skip
    tests:
    - names:
      - TestThroughputBenchmark::test_compile
      mode: mandatory_success
      tags:
      - throughput_benchmark
      - fp16
      edits:
        dtypes:
          include:
          - name: float16
          - name: float32
          exclude:
          - name: bfloat16
            description: Not supported on Spyre
    - names:
      - TestThroughputBenchmark::test_profiling
      mode: mandatory_success
      tags:
      - throughput_benchmark
      - fp16
      edits:
        dtypes:
          include:
          - name: float16
          - name: float32
          exclude:
          - name: bfloat16
            description: Not supported on Spyre
    - names:
      - TestThroughputBenchmark::test_module
      mode: mandatory_success
      tags:
      - throughput_benchmark
      - fp16
      edits:
        dtypes:
          include:
          - name: float16
          - name: float32
          exclude:
          - name: bfloat16
            description: Not supported on Spyre
        inputs:
          args:
          - tensor:
              shape:
              - 8
              - 10
              dtype: float16
              device: spyre
              init: rand
    - names:
      - TestThroughputBenchmark::test_script_module
      mode: mandatory_success
      tags:
      - throughput_benchmark
      - fp16
      edits:
        dtypes:
          include:
          - name: float16
          - name: float32
          exclude:
          - name: bfloat16
            description: Not supported on Spyre
  global:
    devices:
    - spyre
    supported_dtypes:
    - name: float16
    - name: float32
    supported_ops: []
