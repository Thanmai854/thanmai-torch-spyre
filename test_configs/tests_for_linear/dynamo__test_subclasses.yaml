test_suite_config:
  files:
  - path: ${PYTORCH_ROOT}/test/dynamo/test_subclasses.py
    unlisted_test_mode: skip
    tests:
    - names:
      - SubclassTests::test_subclass_parameters_are_static_under_training
      mode: mandatory_success
      tags:
      - dynamo
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
          args:
          - tensor:
              shape:
              - 4
              dtype: float16
              device: spyre
              init: rand
    - names:
      - TestNestedTensor::test_param_subclass_isinstance_input
      mode: mandatory_success
      tags:
      - dynamo
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
          args:
          - tensor:
              shape:
              - 16
              - 16
              dtype: float16
              device: spyre
              init: rand
  global:
    devices:
    - spyre
    supported_dtypes:
    - name: float16
    - name: float32
    supported_ops: []
