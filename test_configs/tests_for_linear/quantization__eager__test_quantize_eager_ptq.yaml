test_suite_config:
  files:
  - path: ${PYTORCH_ROOT}/test/quantization/eager/test_quantize_eager_ptq.py
    unlisted_test_mode: skip
    tests:
    - names:
      - TestQuantizeEagerPTQStatic::test_single_layer
      mode: mandatory_success
      tags:
      - quantization
      edits:
        dtypes:
          include:
          - name: float32
    - names:
      - TestQuantizeEagerPTQStatic::test_save_load_state_dict
      mode: mandatory_success
      tags:
      - quantization
      edits:
        dtypes:
          include:
          - name: float32
        inputs:
          args:
          - tensor:
              shape:
              - 2
              - 5
              dtype: float16
              device: spyre
              init: rand
    - names:
      - TestQuantizeEagerPTQStatic::test_two_layers
      mode: mandatory_success
      tags:
      - quantization
      edits:
        dtypes:
          include:
          - name: float16
    - names:
      - TestQuantizeEagerPTQStatic::test_quantized_embedding
      mode: mandatory_success
      tags:
      - quantization
      edits:
        dtypes:
          include:
          - name: float32
        inputs:
          args:
          - tensor:
              shape:
              - 10
              - 12
              dtype: float16
              device: spyre
              init: rand
    - names:
      - TestQuantizeEagerPTQStatic::test_quantized_embedding_bag
      mode: mandatory_success
      tags:
      - quantization
      edits:
        dtypes:
          include:
          - name: float32
    - names:
      - TestQuantizeEagerPTQDynamic::test_single_layer
      mode: mandatory_success
      tags:
      - quantization
      - fp16
      edits:
        dtypes:
          include:
          - name: float16
          - name: float32
    - names:
      - TestQuantizeEagerPTQDynamic::test_two_layers
      mode: mandatory_success
      tags:
      - quantization
      - fp16
      edits:
        dtypes:
          include:
          - name: float16
          - name: float32
    - names:
      - TestQuantizeEagerPTQDynamic::test_type_match_rule
      mode: mandatory_success
      tags:
      - quantization
      - fp16
      edits:
        dtypes:
          include:
          - name: float16
          - name: float32
    - names:
      - TestQuantizeEagerPTQDynamic::test_embedding_bag_dynamic
      mode: mandatory_success
      tags:
      - quantization
      edits:
        dtypes:
          include:
          - name: float16
    - names:
      - TestQuantizeEagerPTQDynamic::test_embedding_ops_dynamic
      mode: mandatory_success
      tags:
      - quantization
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
          args:
          - tensor:
              shape:
              - 5
              - 5
              dtype: float16
              device: spyre
              init: rand
  global:
    devices:
    - spyre
    supported_dtypes:
    - name: float16
    - name: float32
    supported_ops: []
