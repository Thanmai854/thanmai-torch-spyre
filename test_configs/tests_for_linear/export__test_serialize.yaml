test_suite_config:
  files:
  - path: ${PYTORCH_ROOT}/test/export/test_serialize.py
    unlisted_test_mode: skip
    tests:
    - names:
      - TestSerialize::test_empty_constant
      mode: mandatory_success
      tags:
      - export
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
          args:
          - tensor:
              shape:
              - 1
              - 4
              dtype: float16
              device: spyre
              init: rand
    - names:
      - TestSerialize::test_storage_offset
      mode: mandatory_success
      tags:
      - export
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
          args:
          - tensor:
              shape:
              - 1
              - 4
              dtype: float16
              device: spyre
              init: rand
    - names:
      - TestDeserialize::test_module
      mode: mandatory_success
      tags:
      - export
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
          args:
          - tensor:
              shape:
              - 3
              - 3
              dtype: float16
              device: spyre
              init: rand
    - names:
      - TestSaveLoad::test_save_buffer
      mode: mandatory_success
      tags:
      - export
      edits:
        dtypes:
          include:
          - name: float16
    - names:
      - TestDeserialize::test_positional_argument_with_default_value
      mode: mandatory_success
      tags:
      - export
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
          args:
          - tensor:
              shape:
              - 10
              dtype: float16
              device: spyre
              init: rand
    - names:
      - TestSerializeCustomClass::test_custom_tag_metadata_decomp
      mode: mandatory_success
      tags:
      - export
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
          args:
          - tensor:
              shape:
              - 2
              - 2
              dtype: float16
              device: spyre
              init: rand
  global:
    devices:
    - spyre
    supported_dtypes:
    - name: float16
    - name: float32
    supported_ops: []
