test_suite_config:
  files:
  - path: ${PYTORCH_ROOT}/test/export/test_experimental.py
    unlisted_test_mode: skip
    tests:
    - names:
      - TestExperiment::test_joint_basic
      mode: mandatory_success
      tags:
      - export
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
          args:
          - tensor:
              shape:
              - 3
              dtype: float16
              device: spyre
              init: rand
    - names:
      - TestExperiment::test_export_with_default_kwargs
      mode: mandatory_success
      tags:
      - export
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
          args:
