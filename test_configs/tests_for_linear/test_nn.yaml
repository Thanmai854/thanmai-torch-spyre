test_suite_config:
  files:
  - path: ${PYTORCH_ROOT}/test/test_nn.py
    unlisted_test_mode: skip
    tests:
    - names:
      - TestNN::test_RNN_nonlinearity
      mode: mandatory_success
      tags:
      - nn
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
          args:
          - tensor:
              shape:
              - 10
              - 20
              dtype: float16
              device: spyre
              init: rand
    - names:
      - TestNN::test_RNN_nonlinearity_passed_as_arg
      mode: mandatory_success
      tags:
      - nn
      edits:
        dtypes:
          include:
