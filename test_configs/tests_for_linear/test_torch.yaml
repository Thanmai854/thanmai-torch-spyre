test_suite_config:
  files:
  - path: ${PYTORCH_ROOT}/test/test_torch.py
    unlisted_test_mode: skip
    tests:
    - names:
      - TestTorch::test_deepcopy_parameter
      mode: mandatory_success
      tags:
      - torch
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
          args:
          - tensor:
              shape:
              - 10
              - 1
              dtype: float16
              device: spyre
              init: rand
  global:
    devices:
    - spyre
    supported_dtypes:
    - name: float16
    - name: float32
    supported_ops: []
