test_suite_config:
  files:
  - path: ${PYTORCH_ROOT}/test/lazy/test_functionalization.py
    unlisted_test_mode: skip
    tests:
    - names:
      - LazyFuncionalizationTest::test_lazy_init_with_view
      mode: mandatory_success
      tags:
      - lazy
      - fp16
      edits:
        dtypes:
          include:
          - name: float16
          - name: float32
          exclude:
          - name: bfloat16
            description: Not supported on Spyre
        inputs:
          args:
          - tensor:
              shape:
              - 4
              dtype: float16
              device: spyre
              init: rand
  global:
    devices:
    - spyre
    supported_dtypes:
    - name: float16
    - name: float32
    supported_ops: []
