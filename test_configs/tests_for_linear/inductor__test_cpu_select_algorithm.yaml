test_suite_config:
  files:
  - path: ${PYTORCH_ROOT}/test/inductor/test_cpu_select_algorithm.py
    unlisted_test_mode: skip
    tests:
    - names:
      - TestSelectAlgorithm::test_linear_with_input_of_flexible_layout
      mode: mandatory_success
      tags:
      - inductor
      edits:
        dtypes:
          include:
          - name: float32
    - names:
      - TestSelectAlgorithm::test_linear_with_transpose
      mode: mandatory_success
      tags:
      - inductor
      - fp16
      edits:
        dtypes:
          include:
          - name: float16
          - name: float32
          exclude:
          - name: bfloat16
            description: Not supported on Spyre
