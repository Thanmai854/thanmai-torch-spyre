test_suite_config:
  files:
  - path: ${PYTORCH_ROOT}/test/test_linalg.py
    unlisted_test_mode: skip
    tests:
    - names:
      - TestLinalg::test_lapack_empty
      mode: mandatory_success
      tags:
      - linalg
      edits:
        dtypes:
          include:
          - name: float16
    - names:
      - TestLinalg::test_broadcast_fused_matmul
      mode: mandatory_success
      tags:
      - linalg
      edits:
        dtypes:
          include:
          - name: float32
        inputs:
          args:
          - tensor:
              shape:
              - 1
              - 8
              dtype: float16
              device: spyre
              init: rand
    - names:
      - TestLinalg::test_lower_precision_accumulation_with_ref_path
      mode: mandatory_success
      tags:
      - linalg
      - fp16
      edits:
        dtypes:
          include:
          - name: float16
          - name: float32
          exclude:
          - name: bfloat16
            description: Not supported on Spyre
        inputs:
          args:
          - tensor:
              shape:
              - 1
              - 1
              - 1
              dtype: float16
              device: spyre
              init: rand
  global:
    devices:
    - spyre
    supported_dtypes:
    - name: float16
    - name: float32
    supported_ops: []
