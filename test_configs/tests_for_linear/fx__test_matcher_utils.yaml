test_suite_config:
  files:
  - path: ${PYTORCH_ROOT}/test/fx/test_matcher_utils.py
    unlisted_test_mode: skip
    tests:
    - names:
      - TestMatcher::test_matcher_with_name_node_map_module
      mode: mandatory_success
      tags:
      - fx
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
          args:
          - tensor:
              shape:
              - 3
              - 5
              dtype: float16
              device: spyre
              init: rand
  global:
    devices:
    - spyre
    supported_dtypes:
    - name: float16
    - name: float32
    supported_ops: []
