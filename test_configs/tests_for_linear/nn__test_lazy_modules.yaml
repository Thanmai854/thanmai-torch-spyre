test_suite_config:
  files:
  - path: ${PYTORCH_ROOT}/test/nn/test_lazy_modules.py
    unlisted_test_mode: skip
    tests:
    - names:
      - TestLazyModules::test_lazy_linear_state_and_forward
      mode: mandatory_success
      tags:
      - nn
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
          args:
          - tensor:
              shape:
              - 5
              - 5
              dtype: float16
              device: spyre
              init: rand
    - names:
      - TestLazyModules::test_linear_state
      mode: mandatory_success
      tags:
      - nn
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
          args:
          - tensor:
              shape:
              - 10
              - 5
              dtype: float16
              device: spyre
              init: rand
    - names:
      - TestLazyModules::test_lazy_linear_pickle
      mode: mandatory_success
      tags:
      - nn
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
          args:
          - tensor:
              shape:
              - 5
              - 5
              dtype: float16
              device: spyre
              init: rand
    - names:
      - TestLazyModules::test_linear
      mode: mandatory_success
      tags:
      - nn
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
          args:
          - tensor:
              shape:
              - 5
              - 5
              dtype: float16
              device: spyre
              init: rand
    - names:
      - TestLazyModules::test_chained_initialization
      mode: mandatory_success
      tags:
      - nn
      - fp16
      edits:
        dtypes:
          include:
          - name: float16
          - name: float32
        inputs:
          args:
          - tensor:
              shape:
              - 5
              - 10
              dtype: float16
              device: spyre
              init: rand
    - names:
      - TestLazyModules::test_weight_norm
      mode: mandatory_success
      tags:
      - nn
      edits:
        dtypes:
          include:
          - name: float16
    - names:
      - TestLazyModules::test_spectral_norm
      mode: mandatory_success
      tags:
      - nn
      edits:
        dtypes:
          include:
          - name: float16
  global:
    devices:
    - spyre
    supported_dtypes:
    - name: float16
    - name: float32
    supported_ops: []
