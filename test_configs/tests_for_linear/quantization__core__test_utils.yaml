test_suite_config:
  files:
  - path: ${PYTORCH_ROOT}/test/quantization/core/test_utils.py
    unlisted_test_mode: skip
    tests:
    - names:
      - TestUtils::test_get_fqn_to_example_inputs_simple
      mode: mandatory_success
      tags:
      - quantization
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
          args:
          - tensor:
              shape:
              - 1
              - 5
              dtype: float16
              device: spyre
              init: rand
  global:
    devices:
    - spyre
    supported_dtypes:
    - name: float16
    - name: float32
    supported_ops: []
