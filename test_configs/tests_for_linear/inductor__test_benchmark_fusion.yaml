test_suite_config:
  files:
  - path: ${PYTORCH_ROOT}/test/inductor/test_benchmark_fusion.py
    unlisted_test_mode: skip
    tests:
    - names:
      - BenchmarkFusionTestTemplate::test_avoid_register_spilling
      mode: mandatory_success
      tags:
      - inductor
      - fp16
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
          args:
          - tensor:
              shape:
              - 2048
              - 2048
              dtype: float16
              device: spyre
              init: rand
  global:
    devices:
    - spyre
    supported_dtypes:
    - name: float16
    - name: float32
    supported_ops: []
