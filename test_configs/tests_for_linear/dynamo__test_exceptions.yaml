test_suite_config:
  files:
  - path: ${PYTORCH_ROOT}/test/dynamo/test_exceptions.py
    unlisted_test_mode: skip
    tests:
    - names:
      - ExceptionTests::test_stack_trace_from_observed_exception
      mode: mandatory_success
      tags:
      - dynamo
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
          args:
          - tensor:
              shape:
              - 4
              - 16
              dtype: float16
              device: spyre
              init: rand
  global:
    devices:
    - spyre
    supported_dtypes:
    - name: float16
    - name: float32
    supported_ops: []
