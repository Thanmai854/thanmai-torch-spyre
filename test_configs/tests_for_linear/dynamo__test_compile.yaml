test_suite_config:
  files:
  - path: ${PYTORCH_ROOT}/test/dynamo/test_compile.py
    unlisted_test_mode: skip
    tests:
    - names:
      - InPlaceCompilationTests::test_compile_frozen_module_error
      mode: mandatory_success
      tags:
      - dynamo
      edits:
        dtypes:
          include:
          - name: float32
        inputs:
          args:
          - tensor:
              shape:
              - 2
              - 3
              dtype: float16
              device: spyre
              init: rand
    - names:
      - InPlaceCompilationTests::test_inline_script_module_graph_break
      mode: mandatory_success
      tags:
      - dynamo
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
          args:
          - tensor:
              shape:
              - 2
              - 3
              dtype: float16
              device: spyre
              init: rand
  global:
    devices:
    - spyre
    supported_dtypes:
    - name: float16
    - name: float32
    supported_ops: []
