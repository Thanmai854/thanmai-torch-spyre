test_suite_config:
  files:
  - path: ${PYTORCH_ROOT}/test/test_tensorboard.py
    unlisted_test_mode: skip
    tests:
    - names:
      - TestTensorBoardPytorchGraph::test_pytorch_graph
      mode: mandatory_success
      tags:
      - tensorboard
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
          args:
          - tensor:
              shape:
              - 1
              - 3
              dtype: float16
              device: spyre
              init: rand
    - names:
      - TestTensorBoardPytorchGraph::test_wrong_input_size
      mode: mandatory_success
      tags:
      - tensorboard
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
          args:
          - tensor:
              shape:
              - 1
              - 9
              dtype: float16
              device: spyre
              init: rand
    - names:
      - TestTensorBoardPytorchGraph::test_nested_nn_squential
      mode: mandatory_success
      tags:
      - tensorboard
      edits:
        dtypes:
          include:
          - name: float16
        inputs:
          args:
          - tensor:
              shape:
              - 2
              - 3
              dtype: float16
              device: spyre
              init: rand
  global:
    devices:
    - spyre
    supported_dtypes:
    - name: float16
    - name: float32
    supported_ops: []
