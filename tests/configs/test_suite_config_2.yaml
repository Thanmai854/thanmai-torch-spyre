test_suite_config:
  files:
    - path: ${TORCH_ROOT}/test/test_view_ops.py
      unlisted_test_mode: mandatory_success
      tests:
        - names: # Tests that pass with no special config needed
            - TestViewOps::test_as_strided_gradients
          mode: mandatory_success
  global:
    supported_dtypes:
      - name: float16
      - name: int64
    supported_ops:
      - name: add
        dtypes:
          - name: float16
            precision:
              atol: 1e-3
              rtol: 1e-3
          - name: int64
      - name: mul
      - name: sub
      - name: gcd
        force_xfail: true
